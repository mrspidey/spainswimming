<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Spain Swimming Rankings (Boys 2014)</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--line:#e5e7eb;--text:#0f172a;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)} a{color:var(--blue);text-decoration:none}
.wrap{max-width:1280px;margin:0 auto;padding:12px} h1{margin:0 0 14px;font-size:clamp(28px,5vw,56px);line-height:1.05} h2{margin:0 0 12px;font-size:18px}
.layout{display:grid;grid-template-columns:300px 1fr;gap:14px} .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 1px 2px rgba(0,0,0,.04)} .panel{padding:14px} .stack{display:grid;gap:10px}
input,select,button{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #cbd5e1;background:#fff;font:inherit;color:inherit} button{background:var(--blue);color:#fff;border:none;font-weight:700;cursor:pointer}
.seg{display:flex;gap:8px;flex-wrap:wrap}.seg button{width:auto;background:#fff;border:1px solid var(--line);color:var(--text)} .seg button.active{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
.muted{color:var(--muted);font-size:14px}.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:16px;-webkit-overflow-scrolling:touch} table{width:100%;min-width:760px;border-collapse:collapse;background:#fff} th,td{padding:11px 9px;border-bottom:1px solid #eef2f7;text-align:left;vertical-align:top} th{background:#f8fafc;font-size:14px} td{font-size:14px}
.rank{font-weight:700}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#f1f5f9;font-size:12px;margin:0 6px 6px 0}.small{font-size:12px;color:var(--muted)} .empty{padding:18px;color:var(--muted)} .clubCard{padding:12px;border:1px solid var(--line);border-radius:16px;background:#fff}.desktopOnly{display:table-cell}.mobileDetails{display:none}
@media (max-width:900px){.layout{grid-template-columns:1fr}.wrap{padding:10px}.panel{padding:12px}h1{font-size:26px}.stickyFilters{position:sticky;top:8px;z-index:20}table{min-width:620px}}
@media (max-width:640px){.desktopOnly{display:none}table{min-width:0}.tableWrap{border:none;overflow:visible}table,thead,tbody,tr,td,th{display:block}thead{display:none}tr{border:1px solid var(--line);border-radius:16px;margin-bottom:10px;background:#fff;overflow:hidden}td{border-bottom:1px solid #eef2f7;padding:10px 12px}td:last-child{border-bottom:none}td::before{content:attr(data-label);display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.mobileDetails{display:block;margin-top:4px;font-size:12px;color:var(--muted)}}
</style></head><body><div class="wrap"><h1>Spain Swimming Rankings (Boys 2014)</h1><div class="layout"><div class="stack stickyFilters"><div class="card panel"><h2>Filters</h2><div class="stack"><input id="searchBox" placeholder="Search swimmer or club"/><select id="seasonFilter"><option value="">All seasons</option></select><select id="provinceFilter"><option value="">All provinces</option></select><select id="venueFilter"><option value="">All venues</option></select><select id="clubFilter"><option value="">All clubs</option></select><select id="strokeFilter"><option value="">All strokes</option></select><select id="eventFilter"><option value="">All events</option></select><button id="clearBtn">Clear filters</button><a href="clubs.html" style="text-align:center;padding:12px 14px;border-radius:14px;border:1px solid #cbd5e1;background:#fff;color:#0f172a;font-weight:700">Browse clubs</a></div></div><div class="card panel"><h2>Saved swimmers</h2><div id="savedSwimmers" class="muted">No saved swimmers yet.</div></div></div><div class="stack"><div class="card panel"><div class="seg"><button id="standingsBtn" class="active">Best times</button><button id="resultsBtn">All results</button></div><p class="muted" style="margin:12px 0 0">Search narrows the display without changing rank positions.</p></div><div class="card panel"><h2 id="tableTitle">National event standings</h2><div class="tableWrap"><table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div></div></div></div></div>
<script>
const DATA_URL = "data/spain_boys_2014_results_master.csv";
function parseCsvLine(line){ const out=[]; let cur="",q=false; for(let i=0;i<line.length;i++){ const ch=line[i],nx=line[i+1]; if(ch==='"'){ if(q&&nx==='"'){cur+='"'; i++;} else q=!q; } else if(ch===','&&!q){ out.push(cur); cur=''; } else cur+=ch; } out.push(cur); return out; }
function pick(obj, keys){ for(const k of keys){ if(obj[k] !== undefined && String(obj[k]).trim() !== "") return String(obj[k]).trim(); } return ""; }
function parseCsv(text){ const clean=text.replace(/^\uFEFF/,'').replace(/\r/g,''); const lines=clean.split('\n').filter(x=>x.trim()!==''); if(!lines.length) return []; const headers=parseCsvLine(lines[0]).map(h=>h.trim()); return lines.slice(1).map(line=>{ const vals=parseCsvLine(line); const obj={}; headers.forEach((h,i)=>obj[h]=(vals[i]??'').trim()); const event=pick(obj,['Event','event']); const stroke=pick(obj,['Stroke','stroke']); const canonical=pick(obj,['Canonical_Swimmer','Canonical','canonical_swimmer']); const swimmerRaw=pick(obj,['Swimmer_Raw','Swimmer','swimmer_raw']); const club=pick(obj,['Club','club']); const meet=pick(obj,['Meet','meet']); const venue=pick(obj,['Venue','venue']); const province=pick(obj,['Province','province']); const region=pick(obj,['Region','region']); const season=pick(obj,['Season','season']); const dateIso=pick(obj,['Date_ISO','date_iso']); const date=pick(obj,['Date','date'])||dateIso; const time=pick(obj,['Time','time']); const rank=Number(pick(obj,['Rank','rank'])||0); const distance=Number(pick(obj,['Distance_m','Distance','distance_m','distance'])||(event.match(/\d+/)?.[0]||0)); return {season,province,region,meet,venue,event,stroke,distance,date,dateIso,swimmer_raw:swimmerRaw,canonical_swimmer:canonical||swimmerRaw,club,time,rank,timeSeconds:timeToSeconds(time)}; }).filter(r=>r.event&&r.canonical_swimmer&&r.club&&r.time); }
function timeToSeconds(t){ if(!t) return Infinity; const p=String(t).trim().split(':'); if(p.length===2) return Number(p[0])*60+Number(p[1]); if(p.length===3) return Number(p[0])*3600+Number(p[1])*60+Number(p[2]); return Number(t); }
function normalize(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function uniqueSorted(items){ return [...new Set(items.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es')); }
function eventSort(a,b,rows){ return ((rows.find(r=>r.event===a)?.distance||0)-(rows.find(r=>r.event===b)?.distance||0))||a.localeCompare(b,'es'); }
function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function displaySwimmerName(name){ if(!name) return ''; if(name.includes(',')){ const p=name.split(','); return `${p[1].trim()} ${p[0].trim()}`.replace(/\s+/g,' '); } return name; }
async function loadRows(){ const text=await fetch(DATA_URL,{cache:'no-store'}).then(r=>r.text()); return parseCsv(text); }
let rows=[],baseFiltered=[],resultsFiltered=[],standingsAll=[],standingsVisible=[],viewMode='standings',saved=JSON.parse(localStorage.getItem('swim-saved-swimmers')||'[]');
function getFilters(){ return {q:document.getElementById('searchBox').value.trim(),season:document.getElementById('seasonFilter').value,province:document.getElementById('provinceFilter').value,venue:document.getElementById('venueFilter').value,club:document.getElementById('clubFilter').value,stroke:document.getElementById('strokeFilter').value,event:document.getElementById('eventFilter').value}; }
function fillSelect(id,values,current){ const el=document.getElementById(id),label=el.options[0]?.textContent||'All'; el.innerHTML=''; const first=document.createElement('option'); first.value=''; first.textContent=label; el.appendChild(first); values.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; if(v===current) o.selected=true; el.appendChild(o); }); }
function matchesSearch(r,q){ if(!q) return true; const n=normalize(q); return [r.canonical_swimmer,r.swimmer_raw,r.club,r.meet,r.event,r.venue,r.province].some(v=>normalize(v).includes(n)); }
function renderSaved(){ document.getElementById('savedSwimmers').innerHTML = saved.length ? saved.map(n=>`<span class="badge">${escapeHtml(displaySwimmerName(n))}</span>`).join('') : '<div class="muted">No saved swimmers yet.</div>'; }
function renderTable(){ const head=document.getElementById('tableHead'),body=document.getElementById('tableBody'),title=document.getElementById('tableTitle'); if(viewMode==='standings'){ title.textContent=`National event standings (${standingsVisible.length})`; head.innerHTML='<tr><th>Rank</th><th>Event</th><th>Swimmer</th><th>Club</th><th>Best time</th><th class="desktopOnly">Meet</th><th>Date</th></tr>'; body.innerHTML=standingsVisible.length?standingsVisible.map(r=>`<tr><td data-label="Rank" class="rank">${r.standingRank}</td><td data-label="Event">${escapeHtml(r.event)}</td><td data-label="Swimmer"><a href="swimmer.html?name=${encodeURIComponent(r.canonical_swimmer)}">${escapeHtml(displaySwimmerName(r.canonical_swimmer))}</a></td><td data-label="Club">${escapeHtml(r.club)}</td><td data-label="Best time">${escapeHtml(r.time)}</td><td data-label="Meet" class="desktopOnly">${escapeHtml(r.meet)}<div class="small">${escapeHtml(r.venue)}</div></td><td data-label="Date">${escapeHtml(r.date)}<div class="mobileDetails">${escapeHtml(r.meet)} · ${escapeHtml(r.venue)}</div></td></tr>`).join(''):'<tr><td class="empty">No rows found for the current filters.</td></tr>'; } else { title.textContent=`All results (${resultsFiltered.length})`; const sorted=[...resultsFiltered].sort((a,b)=>String(b.dateIso||b.date).localeCompare(String(a.dateIso||a.date))||(a.distance||0)-(b.distance||0)); head.innerHTML='<tr><th>Date</th><th>Event</th><th>Swimmer</th><th>Club</th><th class="desktopOnly">Meet</th><th>Time</th></tr>'; body.innerHTML=sorted.length?sorted.map(r=>`<tr><td data-label="Date">${escapeHtml(r.date)}<div class="mobileDetails">${escapeHtml(r.meet)} · ${escapeHtml(r.venue)}</div></td><td data-label="Event">${escapeHtml(r.event)}</td><td data-label="Swimmer"><a href="swimmer.html?name=${encodeURIComponent(r.canonical_swimmer)}">${escapeHtml(displaySwimmerName(r.canonical_swimmer))}</a></td><td data-label="Club">${escapeHtml(r.club)}</td><td data-label="Meet" class="desktopOnly">${escapeHtml(r.meet)}<div class="small">${escapeHtml(r.venue)}</div></td><td data-label="Time">${escapeHtml(r.time)}</td></tr>`).join(''):'<tr><td class="empty">No rows found for the current filters.</td></tr>'; } }
function applyFilters(){ const f=getFilters(); baseFiltered=rows.filter(r=>!f.season||r.season===f.season).filter(r=>!f.province||r.province===f.province).filter(r=>!f.venue||r.venue===f.venue).filter(r=>!f.club||r.club===f.club).filter(r=>!f.stroke||r.stroke===f.stroke).filter(r=>!f.event||r.event===f.event); resultsFiltered=baseFiltered.filter(r=>matchesSearch(r,f.q)); const eventOptions=uniqueSorted(rows.filter(r=>!f.stroke||r.stroke===f.stroke).map(r=>r.event)).sort((a,b)=>eventSort(a,b,rows)); if(f.event&&!eventOptions.includes(f.event)){ document.getElementById('eventFilter').value=''; return applyFilters(); } fillSelect('eventFilter',eventOptions,document.getElementById('eventFilter').value); const byEvent=new Map(); baseFiltered.forEach(r=>{ if(!byEvent.has(r.event)) byEvent.set(r.event,new Map()); const swimmers=byEvent.get(r.event), existing=swimmers.get(r.canonical_swimmer); if(!existing||r.timeSeconds<existing.timeSeconds) swimmers.set(r.canonical_swimmer,r); }); standingsAll=[]; [...byEvent.entries()].forEach(([event,swimmerMap])=>{ const list=[...swimmerMap.values()].sort((a,b)=>a.timeSeconds-b.timeSeconds||a.canonical_swimmer.localeCompare(b.canonical_swimmer,'es')); list.forEach((r,i)=>standingsAll.push({...r,standingRank:i+1})); }); standingsAll.sort((a,b)=>(a.distance||0)-(b.distance||0)||a.event.localeCompare(b.event,'es')||a.standingRank-b.standingRank); standingsVisible=standingsAll.filter(r=>matchesSearch(r,f.q)); renderSaved(); renderTable(); }
function initFilters(){ fillSelect('seasonFilter',uniqueSorted(rows.map(r=>r.season)),''); fillSelect('provinceFilter',uniqueSorted(rows.map(r=>r.province)),''); fillSelect('venueFilter',uniqueSorted(rows.map(r=>r.venue)),''); fillSelect('clubFilter',uniqueSorted(rows.map(r=>r.club)),''); fillSelect('strokeFilter',uniqueSorted(rows.map(r=>r.stroke)),''); fillSelect('eventFilter',uniqueSorted(rows.map(r=>r.event)).sort((a,b)=>eventSort(a,b,rows)),''); ['searchBox','seasonFilter','provinceFilter','venueFilter','clubFilter','strokeFilter','eventFilter'].forEach(id=>document.getElementById(id).addEventListener(id==='searchBox'?'input':'change',applyFilters)); document.getElementById('clearBtn').addEventListener('click',()=>{ document.getElementById('searchBox').value=''; ['seasonFilter','provinceFilter','venueFilter','clubFilter','strokeFilter','eventFilter'].forEach(id=>document.getElementById(id).value=''); applyFilters(); }); document.getElementById('standingsBtn').addEventListener('click',()=>{ viewMode='standings'; renderTable(); }); document.getElementById('resultsBtn').addEventListener('click',()=>{ viewMode='results'; renderTable(); }); }
loadRows().then(r=>{ rows=r; initFilters(); renderSaved(); applyFilters(); }).catch(err=>{ console.error(err); document.getElementById('tableTitle').textContent='Failed to load data'; document.getElementById('tableBody').innerHTML='<tr><td class="empty">Could not load the CSV file.</td></tr>'; });
</script></body></html>
