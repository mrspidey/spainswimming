\<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Results</title>
  <script src="data/app.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="index.html">Home</a>
      <a href="search.html" class="active">Search</a>
      <a href="clubs.html">Clubs</a>
    </div>

    <h1>Search results</h1>

    <div class="grid sidebar">
      <div class="card panel stack">
        <div class="nav" style="margin:0">
          <a href="#" id="allBtn" class="active">All results</a>
          <a href="#" id="rankBtn">Rankings</a>
        </div>

        <input id="searchInput" type="text" placeholder="Search swimmer or club" />
        <select id="seasonFilter"><option value="">All seasons</option></select>
        <select id="provinceFilter"><option value="">All provinces</option></select>
        <select id="venueFilter"><option value="">All venues</option></select>
        <select id="clubFilter"><option value="">All clubs</option></select>
        <select id="strokeFilter"><option value="">All strokes</option></select>
        <select id="eventFilter"><option value="">All events</option></select>
        <button id="clearBtn">Clear filters</button>
      </div>

      <div class="card panel">
        <h2 id="sectionTitle">All results</h2>
        <div class="tableWrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    injectStyles();

    let rows = [];
    let mode = "all";

    function canonicalEventDisplay(event){
      const key = canonicalEventKey(event);
      const m = key.match(/^(\d+)\s+(back|free|fly|breast|im)$/);
      if (!m) return eventDisplay(event);

      const strokeMap = {
        back: "Backstroke",
        free: "Freestyle",
        fly: "Butterfly",
        breast: "Breaststroke",
        im: "Medley"
      };

      return `${m[1]}m ${strokeMap[m[2]]}`;
    }

    function buildEventOptions(rows){
      const map = new Map();
      rows.forEach(r => {
        const key = canonicalEventKey(r.event);
        if (!key) return;
        map.set(key, canonicalEventDisplay(r.event));
      });

      return [...map.entries()]
        .sort((a,b) => a[1].localeCompare(b[1], "es"))
        .map(([value, label]) => ({ value, label }));
    }

    function fillSelect(el, values, placeholder){
      el.innerHTML = `<option value="">${placeholder}</option>` +
        values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
    }

    function fillEventSelect(el, rows){
      const opts = buildEventOptions(rows);
      el.innerHTML = `<option value="">All events</option>` +
        opts.map(o => `<option value="${escapeHtml(o.value)}">${escapeHtml(o.label)}</option>`).join("");
    }

    function getFilteredRows(){
      const q = normalize(document.getElementById("searchInput").value);
      const season = document.getElementById("seasonFilter").value;
      const province = document.getElementById("provinceFilter").value;
      const venue = document.getElementById("venueFilter").value;
      const club = document.getElementById("clubFilter").value;
      const stroke = document.getElementById("strokeFilter").value;
      const eventKey = document.getElementById("eventFilter").value;

      return rows.filter(r => {
        if (q) {
          const hay = normalize([
            r.canonical_swimmer,
            displaySwimmerName(r.canonical_swimmer),
            r.club
          ].join(" "));
          if (!hay.includes(q)) return false;
        }

        if (season && r.season !== season) return false;
        if (province && r.province !== province) return false;
        if (venue && r.venue !== venue) return false;
        if (club && r.club !== club) return false;
        if (stroke && strokeEnglish(r.event) !== stroke) return false;
        if (eventKey && canonicalEventKey(r.event) !== eventKey) return false;

        return true;
      });
    }

    function bestRowsBySwimmer(rowsIn){
      const by = new Map();

      rowsIn.forEach(r => {
        const key = normalize([r.canonical_swimmer, canonicalEventKey(r.event)].join("|"));
        const ex = by.get(key);
        if (!ex || r.timeSeconds < ex.timeSeconds) by.set(key, r);
      });

      return [...by.values()].sort((a,b) =>
        a.timeSeconds - b.timeSeconds ||
        a.canonical_swimmer.localeCompare(b.canonical_swimmer, "es")
      );
    }

    function render(){
      document.getElementById("allBtn").classList.toggle("active", mode === "all");
      document.getElementById("rankBtn").classList.toggle("active", mode === "rank");

      const filtered = getFilteredRows();
      const head = document.getElementById("tableHead");
      const body = document.getElementById("tableBody");
      const section = document.getElementById("sectionTitle");

      if (mode === "all") {
        section.textContent = `All results (${filtered.length})`;
        head.innerHTML = `
          <tr>
            <th>Place</th>
            <th>Date</th>
            <th>Event</th>
            <th>Swimmer</th>
            <th>Club</th>
            <th>Meet</th>
            <th>Time</th>
          </tr>
        `;

        const sorted = [...filtered].sort((a,b) =>
          String(b.dateIso || b.date).localeCompare(String(a.dateIso || a.date)) ||
          a.rank - b.rank ||
          a.timeSeconds - b.timeSeconds
        );

        body.innerHTML = sorted.map(r => `
          <tr>
            <td data-label="Place">${r.rank || ""}</td>
            <td data-label="Date">${escapeHtml(r.date)}</td>
            <td data-label="Event">${escapeHtml(eventDisplay(r.event))}</td>
            <td data-label="Swimmer">
              <a href="swimmer.html?name=${encodeURIComponent(r.canonical_swimmer)}">
                ${escapeHtml(displaySwimmerName(r.canonical_swimmer))}
              </a>
            </td>
            <td data-label="Club">${escapeHtml(r.club)}</td>
            <td data-label="Meet">${escapeHtml(r.meet)}<div class="small">${escapeHtml(r.venue)}</div></td>
            <td data-label="Time">${escapeHtml(r.time)}</td>
          </tr>
        `).join("") || `<tr><td colspan="7" class="empty">No data found.</td></tr>`;
      } else {
        const ranked = bestRowsBySwimmer(filtered);
        section.textContent = `Rankings (${ranked.length})`;
        head.innerHTML = `
          <tr>
            <th>Rank</th>
            <th>Swimmer</th>
            <th>Club</th>
            <th>Event</th>
            <th>Meet</th>
            <th>Date</th>
            <th>Time</th>
          </tr>
        `;

        body.innerHTML = ranked.map((r, i) => `
          <tr>
            <td data-label="Rank" class="rank">${i + 1}</td>
            <td data-label="Swimmer">
              <a href="swimmer.html?name=${encodeURIComponent(r.canonical_swimmer)}">
                ${escapeHtml(displaySwimmerName(r.canonical_swimmer))}
              </a>
            </td>
            <td data-label="Club">${escapeHtml(r.club)}</td>
            <td data-label="Event">${escapeHtml(eventDisplay(r.event))}</td>
            <td data-label="Meet">${escapeHtml(r.meet)}<div class="small">${escapeHtml(r.venue)}</div></td>
            <td data-label="Date">${escapeHtml(r.date)}</td>
            <td data-label="Time">${escapeHtml(r.time)}</td>
          </tr>
        `).join("") || `<tr><td colspan="7" class="empty">No data found.</td></tr>`;
      }
    }

    loadRows().then(allRows => {
      rows = allRows;

      fillSelect(document.getElementById("seasonFilter"), uniqueSorted(rows.map(r => r.season)), "All seasons");
      fillSelect(document.getElementById("provinceFilter"), uniqueSorted(rows.map(r => r.province)), "All provinces");
      fillSelect(document.getElementById("venueFilter"), uniqueSorted(rows.map(r => r.venue)), "All venues");
      fillSelect(document.getElementById("clubFilter"), uniqueSorted(rows.map(r => r.club)), "All clubs");
      fillSelect(document.getElementById("strokeFilter"), uniqueSorted(rows.map(r => strokeEnglish(r.event)).filter(Boolean)), "All strokes");
      fillEventSelect(document.getElementById("eventFilter"), rows);

      mountAutocomplete("searchDataList", "searchInput", rows);

      document.getElementById("allBtn").addEventListener("click", e => {
        e.preventDefault();
        mode = "all";
        render();
      });

      document.getElementById("rankBtn").addEventListener("click", e => {
        e.preventDefault();
        mode = "rank";
        render();
      });

      [
        "searchInput",
        "seasonFilter",
        "provinceFilter",
        "venueFilter",
        "clubFilter",
        "strokeFilter",
        "eventFilter"
      ].forEach(id => {
        document.getElementById(id).addEventListener("input", render);
        document.getElementById(id).addEventListener("change", render);
      });

      document.getElementById("clearBtn").addEventListener("click", () => {
        document.getElementById("searchInput").value = "";
        document.getElementById("seasonFilter").value = "";
        document.getElementById("provinceFilter").value = "";
        document.getElementById("venueFilter").value = "";
        document.getElementById("clubFilter").value = "";
        document.getElementById("strokeFilter").value = "";
        document.getElementById("eventFilter").value = "";
        render();
      });

      render();
    }).catch(err => {
      console.error(err);
      document.body.insertAdjacentHTML("beforeend", `<div class="wrap"><div class="card panel">Could not load the CSV file.</div></div>`);
    });
  </script>
</body>
</html>
