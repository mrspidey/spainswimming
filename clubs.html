<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clubs</title>
  <script src="data/app.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="index.html">Home</a>
      <a href="search.html">Search</a>
      <a href="clubs.html" class="active">Clubs</a>
    </div>

    <div class="card panel" style="margin-bottom:14px">
      <div class="hero">
        <div>
          <h1>Club directory</h1>
          <div class="muted">Browse clubs, then open swimmer profiles directly.</div>
        </div>
        <div class="kpiGrid" style="max-width:640px;width:100%">
          <div class="kpi">
            <div class="label">Clubs</div>
            <div class="value" id="kpiClubs">0</div>
          </div>
          <div class="kpi">
            <div class="label">Swimmers</div>
            <div class="value" id="kpiSwimmers">0</div>
          </div>
          <div class="kpi">
            <div class="label">Swims</div>
            <div class="value" id="kpiSwims">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card panel" style="margin-bottom:14px">
      <div class="grid" style="grid-template-columns:1fr .8fr;gap:12px">
        <input id="clubSearch" placeholder="Search club" />
        <select id="provinceFilter">
          <option value="">All provinces</option>
        </select>
      </div>
    </div>

    <div id="clubList" class="stack"></div>
  </div>

  <script>
    injectStyles();

    function renderClubs(rows){
      const clubs = uniqueSorted(rows.map(r => r.club));
      const provinces = uniqueSorted(rows.map(r => r.province).filter(Boolean));

      document.getElementById("kpiClubs").textContent = clubs.length;
      document.getElementById("kpiSwimmers").textContent = uniqueSorted(rows.map(r => r.canonical_swimmer)).length;
      document.getElementById("kpiSwims").textContent = rows.length;

      const provinceFilter = document.getElementById("provinceFilter");
      provinceFilter.innerHTML =
        `<option value="">All provinces</option>` +
        provinces.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join("");

      const clubSearch = document.getElementById("clubSearch");
      const clubList = document.getElementById("clubList");

      function draw(){
        const q = normalize(clubSearch.value);
        const p = provinceFilter.value;

        const filteredClubs = clubs.filter(club => {
          const clubRows = rows.filter(r => r.club === club);
          const provinceMatch = !p || clubRows.some(r => r.province === p);
          const textMatch = !q || normalize(club).includes(q);
          return provinceMatch && textMatch;
        });

        clubList.innerHTML = filteredClubs.map(club => {
          const clubRows = rows.filter(r => r.club === club && (!p || r.province === p));
          const swimmers = uniqueSorted(clubRows.map(r => r.canonical_swimmer));

          return `
            <div class="listCard">
              <div style="font-weight:800;font-size:18px;margin-bottom:6px">${escapeHtml(club)}</div>
              <div class="muted" style="margin-bottom:10px">${swimmers.length} swimmers · ${clubRows.length} swims</div>
              <div>
                ${swimmers.map(s => `
                  <span class="badge">
                    <a href="swimmer.html?name=${encodeURIComponent(s)}">${escapeHtml(displaySwimmerName(s))}</a>
                  </span>
                `).join("")}
              </div>
            </div>
          `;
        }).join("") || `<div class="empty">No clubs found.</div>`;
      }

      clubSearch.addEventListener("input", draw);
      provinceFilter.addEventListener("change", draw);
      draw();
    }

    loadRows()
      .then(renderClubs)
      .catch(err => {
        console.error(err);
        document.getElementById("clubList").innerHTML = `<div class="empty">Could not load the CSV file.</div>`;
      });
  </script>
</body>
</html>
