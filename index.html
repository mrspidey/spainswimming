<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spain Swimming Results (Boys 2014)</title>
  <script src="data/app.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="topnav">
      <a class="navbtn active" href="index.html">Home</a>
      <a class="navbtn" href="search.html">Search</a>
      <a class="navbtn" href="clubs.html">Clubs</a>
    </div>

    <div class="hero card">
      <div>
        <h1>Spain Swimming Results (Boys 2014)</h1>
        <div class="muted">Latest completed meets from the merged master dataset.</div>
      </div>
      <div class="hero-stats">
        <div class="kpi">
          <div class="label">Completed meets</div>
          <div class="value" id="kpiMeets">0</div>
        </div>
        <div class="kpi">
          <div class="label">Athletes</div>
          <div class="value" id="kpiAthletes">0</div>
        </div>
        <div class="kpi">
          <div class="label">Swims</div>
          <div class="value" id="kpiSwims">0</div>
        </div>
      </div>
    </div>

    <div class="filters card">
      <div class="filters-grid">
        <input id="meetSearch" class="input" type="text" placeholder="Search meet or venue" />
        <select id="provinceFilter" class="input">
          <option value="">All provinces</option>
        </select>
      </div>
    </div>

    <div class="section-head">
      <h2>Latest completed meets</h2>
      <div class="subtle" id="resultCount">0 meets</div>
    </div>

    <div id="meetList" class="meet-grid"></div>
  </div>

  <script>
    injectStyles();

    const indexStyles = `
      :root{
        --bg:#f8fcff;
        --card:#ffffff;
        --border:#d9e9f7;
        --text:#0f172a;
        --muted:#5b6b7f;
        --primary:#0ea5e9;
        --primary-hover:#0284c7;
        --soft:#e0f2fe;
        --soft-2:#f4fbff;
        --shadow:0 1px 2px rgba(15,23,42,.04);
        --radius:16px;
      }

      *{box-sizing:border-box}

      body{
        margin:0;
        font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
        background:linear-gradient(180deg,#f7fbff 0%, #f4f8fc 100%);
        color:var(--text);
      }

      .wrap{
        max-width:1240px;
        margin:0 auto;
        padding:28px 22px 40px;
      }

      .topnav{
        display:flex;
        gap:10px;
        margin-bottom:18px;
      }

      .navbtn{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        border-radius:12px;
        border:1px solid var(--border);
        background:#fff;
        color:var(--text);
        padding:10px 16px;
        font-weight:700;
        text-decoration:none;
        transition:.15s ease;
      }

      .navbtn:hover{
        border-color:#bfdcf1;
        background:#fff;
      }

      .navbtn.active{
        background:var(--soft);
        color:#075985;
        border-color:#b8def8;
      }

      .card{
        background:var(--card);
        border:1px solid var(--border);
        border-radius:var(--radius);
        box-shadow:var(--shadow);
      }

      .hero{
        padding:18px 18px 20px;
        display:grid;
        grid-template-columns:1.2fr .9fr;
        gap:18px;
        align-items:start;
      }

      h1{
        margin:0 0 8px;
        font-size:40px;
        line-height:1;
        letter-spacing:-.03em;
        font-weight:800;
      }

      h2{
        margin:0;
        font-size:20px;
        letter-spacing:-.02em;
      }

      .muted{
        color:var(--muted);
      }

      .subtle{
        color:var(--muted);
        font-size:13px;
      }

      .hero-stats{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:12px;
      }

      .kpi{
        border:1px solid var(--border);
        border-radius:14px;
        padding:14px 16px;
        background:#fff;
      }

      .kpi .label{
        color:var(--muted);
        font-size:12px;
        margin-bottom:6px;
      }

      .kpi .value{
        font-size:22px;
        font-weight:800;
      }

      .filters{
        margin-top:16px;
        padding:16px;
        background:rgba(255,255,255,.9);
        backdrop-filter:saturate(140%) blur(6px);
      }

      .filters-grid{
        display:grid;
        grid-template-columns:1.4fr .7fr;
        gap:12px;
      }

      .input{
        width:100%;
        border:1px solid var(--border);
        background:#fff;
        border-radius:12px;
        padding:12px 14px;
        font-size:14px;
        color:var(--text);
      }

      .section-head{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin:20px 0 14px;
      }

      .meet-grid{
        display:grid;
        grid-template-columns:1fr;
        gap:14px;
      }

      .meet-card{
        padding:18px;
        background:linear-gradient(180deg,#ffffff 0%, #fbfeff 100%);
      }

      .meet-title{
        font-size:20px;
        font-weight:800;
        letter-spacing:-.02em;
        margin:0 0 6px;
      }

      .meet-meta{
        color:var(--muted);
        font-size:14px;
      }

      .pill-row{
        display:flex;
        flex-wrap:wrap;
        gap:8px;
        margin-top:10px;
      }

      .pill{
        display:inline-flex;
        align-items:center;
        padding:4px 8px;
        border-radius:999px;
        background:var(--soft);
        color:#075985;
        font-size:12px;
        font-weight:800;
        border:1px solid #b8def8;
      }

      .meet-actions{
        margin-top:14px;
        display:flex;
        gap:10px;
        flex-wrap:wrap;
      }

      .btn{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        border-radius:11px;
        padding:10px 14px;
        font-size:14px;
        font-weight:800;
        text-decoration:none;
        border:1px solid transparent;
        transition:.15s ease;
      }

      .btn-primary{
        background:var(--primary);
        color:#fff;
        box-shadow:0 1px 2px rgba(2,132,199,.18);
      }

      .btn-primary:hover{
        background:var(--primary-hover);
      }

      .empty{
        padding:20px;
        text-align:center;
        color:var(--muted);
      }

      @media (max-width:900px){
        .hero{grid-template-columns:1fr}
        .hero-stats{grid-template-columns:1fr 1fr 1fr}
        .filters-grid{grid-template-columns:1fr}
      }

      @media (max-width:620px){
        .wrap{padding:14px}
        h1{font-size:32px}
        .hero-stats{grid-template-columns:1fr}
      }
    `;

    document.head.insertAdjacentHTML("beforeend", `<style>${indexStyles}</style>`);

    function humanDate(dateIso){
      const v = String(dateIso || "").trim();
      if (!v) return "";
      if (/^\\d{4}-\\d{2}-\\d{2}$/.test(v)) {
        const [y,m,d] = v.split("-");
        return `${d}/${m}/${y}`;
      }
      return v;
    }

    function preferMeetName(names){
      const cleaned = [...new Set(names.filter(Boolean))];
      if (!cleaned.length) return "";
      cleaned.sort((a,b) => b.length - a.length || a.localeCompare(b, "es"));
      return cleaned[0];
    }

    function groupMeetRows(rows){
      const firstPass = new Map();

      rows.forEach(r => {
        const key = normalize([
          r.meet,
          r.dateIso || r.date
        ].join("|"));

        if (!firstPass.has(key)) firstPass.set(key, []);
        firstPass.get(key).push(r);
      });

      const preliminary = [...firstPass.values()].map(group => {
        const first = group[0];
        const meetName = preferMeetName(group.map(r => r.meet));
        const venue = preferMeetName(group.map(r => r.venue));
        const province = preferMeetName(group.map(r => r.province));
        const dateIso = preferMeetName(group.map(r => r.dateIso || r.date));
        const uniqueEvents = uniqueSorted(group.map(r => canonicalEventKey(r.event)));
        const uniqueSwimmers = uniqueSorted(group.map(r => r.canonical_swimmer));

        return {
          id: meetId(first),
          meet: meetName,
          venue,
          province,
          dateIso,
          eventCount: uniqueEvents.length,
          swimmerCount: uniqueSwimmers.length,
          rows: group
        };
      });

      const secondPass = new Map();

      preliminary.forEach(m => {
        const mergeKey = normalize([
          m.venue,
          m.dateIso,
          m.eventCount,
          m.swimmerCount
        ].join("|"));

        if (!secondPass.has(mergeKey)) secondPass.set(mergeKey, []);
        secondPass.get(mergeKey).push(m);
      });

      return [...secondPass.values()].map(cluster => {
        if (cluster.length === 1) return cluster[0];

        const richest = [...cluster].sort((a,b) =>
          b.meet.length - a.meet.length ||
          a.meet.localeCompare(b.meet, "es")
        )[0];

        const mergedRows = cluster.flatMap(x => x.rows);

        return {
          id: richest.id,
          meet: richest.meet,
          venue: richest.venue,
          province: richest.province,
          dateIso: richest.dateIso,
          eventCount: richest.eventCount,
          swimmerCount: richest.swimmerCount,
          rows: mergedRows
        };
      }).sort((a,b) =>
        String(b.dateIso).localeCompare(String(a.dateIso)) ||
        a.meet.localeCompare(b.meet, "es")
      );
    }

    function renderHome(rows){
      document.getElementById("kpiSwims").textContent = rows.length;
      document.getElementById("kpiAthletes").textContent =
        uniqueSorted(rows.map(r => r.canonical_swimmer)).length;

      const provinces = uniqueSorted(rows.map(r => r.province).filter(Boolean));
      const provinceFilter = document.getElementById("provinceFilter");
      provinceFilter.innerHTML =
        `<option value="">All provinces</option>` +
        provinces.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join("");

      const allMeets = groupMeetRows(rows);
      document.getElementById("kpiMeets").textContent = allMeets.length;

      const searchInput = document.getElementById("meetSearch");
      const list = document.getElementById("meetList");
      const count = document.getElementById("resultCount");

      function draw(){
        const q = normalize(searchInput.value);
        const p = provinceFilter.value;

        const filtered = allMeets.filter(m => {
          const matchesQ = !q || normalize(`${m.meet} ${m.venue}`).includes(q);
          const matchesP = !p || m.province === p;
          return matchesQ && matchesP;
        });

        count.textContent = `${filtered.length} meet${filtered.length === 1 ? "" : "s"}`;

        if (!filtered.length) {
          list.innerHTML = `<div class="card empty">No meets found.</div>`;
          return;
        }

        list.innerHTML = filtered.map(m => `
          <div class="card meet-card">
            <div>
              <div class="meet-title">${escapeHtml(m.meet)}</div>
              <div class="meet-meta">${escapeHtml(m.venue)} · ${humanDate(m.dateIso)}</div>
              <div class="pill-row">
                <span class="pill">${escapeHtml(m.province || "Spain")}</span>
                <span class="pill">${m.eventCount} event${m.eventCount === 1 ? "" : "s"}</span>
                <span class="pill">${m.swimmerCount} swimmer${m.swimmerCount === 1 ? "" : "s"}</span>
              </div>
            </div>
            <div class="meet-actions">
              <a class="btn btn-primary" href="meet.html?id=${encodeURIComponent(m.id)}">View results</a>
            </div>
          </div>
        `).join("");
      }

      searchInput.addEventListener("input", draw);
      provinceFilter.addEventListener("change", draw);
      draw();
    }

    loadRows().then(renderHome).catch(err => {
      console.error(err);
      document.getElementById("meetList").innerHTML =
        `<div class="card empty">Could not load homepage data.</div>`;
    });
  </script>
</body>
</html>
