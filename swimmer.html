<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Swimmer Profile</title><script src="data/app.js"></script></head><body><div class="wrap"><div class="nav"><a href="index.html">Home</a><a href="search.html">Search</a><a href="clubs.html">Clubs</a></div><a href="javascript:history.back()">← Back</a><div class="card panel" style="margin-top:12px"><div class="hero"><div><h1 id="swimmerName">Swimmer</h1><div class="muted" id="swimmerMeta"></div></div><div class="kpiGrid" style="max-width:640px;width:100%"><div class="kpi"><div class="label">Races</div><div class="value" id="kpiRaces">0</div></div><div class="kpi"><div class="label">Events</div><div class="value" id="kpiEvents">0</div></div><div class="kpi"><div class="label">PBs tracked</div><div class="value" id="kpiPBs">0</div></div></div></div></div><div class="stack" style="margin-top:16px"><div class="card panel"><div class="nav"><a href="#" id="bestBtn" class="active">Best times</a><a href="#" id="resultsBtn">All results</a><a href="#" id="progressBtn">PB vs baseline</a></div><p class="muted" id="subtitle">Best times for this swimmer across the current dataset.</p></div><div class="card panel"><h2 id="sectionTitle">Best times</h2><div class="tableWrap"><table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div></div></div></div><script>injectStyles();let rows=[],swimmerRows=[],mode='best';const swimmerName=getParam('name');function bestRowsByEvent(rowsForSwimmer){const by=new Map();rowsForSwimmer.forEach(r=>{const key=canonicalEventKey(r.event);const ex=by.get(key);if(!ex||r.timeSeconds<ex.timeSeconds)by.set(key,r);});return [...by.values()].sort((a,b)=>(a.distance||0)-(b.distance||0)||a.event.localeCompare(b.event,'es'));}function getRanksForEvent(eventKey,province,swimmerCanonical){const nationalRows=rows.filter(x=>canonicalEventKey(x.event)===eventKey),nationalBest=new Map();nationalRows.forEach(x=>{const ex=nationalBest.get(x.canonical_swimmer);if(!ex||x.timeSeconds<ex.timeSeconds)nationalBest.set(x.canonical_swimmer,x);});const nationalRanked=[...nationalBest.values()].sort((a,b)=>a.timeSeconds-b.timeSeconds);const provincialRows=rows.filter(x=>canonicalEventKey(x.event)===eventKey&&x.province===province),provincialBest=new Map();provincialRows.forEach(x=>{const ex=provincialBest.get(x.canonical_swimmer);if(!ex||x.timeSeconds<ex.timeSeconds)provincialBest.set(x.canonical_swimmer,x);});const provincialRanked=[...provincialBest.values()].sort((a,b)=>a.timeSeconds-b.timeSeconds);return {provincial:provincialRanked.findIndex(x=>normalize(x.canonical_swimmer)===normalize(swimmerCanonical))+1,national:nationalRanked.findIndex(x=>normalize(x.canonical_swimmer)===normalize(swimmerCanonical))+1};}function render(){const head=document.getElementById('tableHead'),body=document.getElementById('tableBody'),subtitle=document.getElementById('subtitle'),sectionTitle=document.getElementById('sectionTitle');const isJack=swimmerRows.some(r=>isJackName(r.canonical_swimmer));document.getElementById('bestBtn').classList.toggle('active',mode==='best');document.getElementById('resultsBtn').classList.toggle('active',mode==='results');document.getElementById('progressBtn').classList.toggle('active',mode==='progress');if(mode==='best'){subtitle.textContent='Best times for this swimmer across the current dataset.';sectionTitle.textContent='Best times';const bests=bestRowsByEvent(swimmerRows);head.innerHTML='<tr><th>Event</th><th>Best time</th><th>Meet</th><th>Date</th><th>Provincial rank</th><th>National rank</th></tr>';body.innerHTML=bests.map(r=>{const ranks=getRanksForEvent(canonicalEventKey(r.event),r.province,r.canonical_swimmer);return `<tr><td data-label="Event">${escapeHtml(r.event)}</td><td data-label="Best time">${escapeHtml(r.time)}</td><td data-label="Meet">${escapeHtml(r.meet)}<div class="small">${escapeHtml(r.venue)}</div></td><td data-label="Date">${escapeHtml(r.date)}</td><td data-label="Provincial rank">${ranks.provincial||''}</td><td data-label="National rank">${ranks.national||''}</td></tr>`;}).join('')||'<tr><td class="empty">No data found.</td></tr>';}else if(mode==='results'){subtitle.textContent='All recorded races for this swimmer in the current master CSV.';sectionTitle.textContent='All results';const sorted=[...swimmerRows].sort((a,b)=>String(b.dateIso||b.date).localeCompare(String(a.dateIso||a.date))||(a.distance||0)-(b.distance||0));head.innerHTML='<tr><th>Date</th><th>Event</th><th>Time</th><th>Rank</th><th>Meet</th><th>Club</th></tr>';body.innerHTML=sorted.map(r=>`<tr><td data-label="Date">${escapeHtml(r.date)}</td><td data-label="Event">${escapeHtml(r.event)}</td><td data-label="Time">${escapeHtml(r.time)}</td><td data-label="Rank">${r.rank||''}</td><td data-label="Meet">${escapeHtml(r.meet)}<div class="small">${escapeHtml(r.venue)}</div></td><td data-label="Club">${escapeHtml(r.club)}</td></tr>`).join('')||'<tr><td class="empty">No data found.</td></tr>';}else{subtitle.textContent=isJack?'Baseline seeded from Bulgaria and World School screenshots. Spain times become the active PB once beaten.':'PB comparison is currently only set up for Jack.';sectionTitle.textContent='PB vs baseline';if(!isJack){head.innerHTML='<tr><th>Message</th></tr>';body.innerHTML='<tr><td class="empty">Baseline tracking is currently configured only for Jack Simeonov.</td></tr>';return;}const bestByKey=new Map();swimmerRows.forEach(r=>{const key=canonicalEventKey(r.event);const ex=bestByKey.get(key);if(!ex||r.timeSeconds<ex.timeSeconds)bestByKey.set(key,r);});const rowsOut=JACK_BASELINES.map(base=>{const current=bestByKey.get(base.key);const baseSecs=timeToSeconds(base.time);const currentSecs=current?current.timeSeconds:Infinity;const activeBestSecs=Math.min(baseSecs,currentSecs);const activeBest=activeBestSecs===baseSecs?base.time:current.time;const delta=current?currentSecs-activeBestSecs:Infinity;return {event:base.label,baseline:base.time,baselineSource:base.source,current:current?current.time:'—',currentMeet:current?current.meet:'',currentDate:current?current.date:'',activeBest,delta};});head.innerHTML='<tr><th>Event</th><th>Baseline PB</th><th>Current Spain best</th><th>Active PB</th><th>Δ vs active PB</th><th>Source</th></tr>';body.innerHTML=rowsOut.map(r=>`<tr><td data-label="Event">${escapeHtml(r.event)}</td><td data-label="Baseline PB">${escapeHtml(r.baseline)}</td><td data-label="Current Spain best">${escapeHtml(r.current)}${r.currentMeet?`<div class="small">${escapeHtml(r.currentMeet)} · ${escapeHtml(r.currentDate)}</div>`:''}</td><td data-label="Active PB">${escapeHtml(r.activeBest)}</td><td data-label="Δ vs active PB" class="${!isFinite(r.delta)?'':r.delta<=0?'good':'bad'}">${isFinite(r.delta)?secondsToDelta(r.delta):'—'}</td><td data-label="Source">${escapeHtml(r.baselineSource)}</td></tr>`).join('');}}loadRows().then(allRows=>{rows=allRows;swimmerRows=rows.filter(r=>normalize(r.canonical_swimmer)===normalize(swimmerName));const display=swimmerRows.length?displaySwimmerName(swimmerRows[0].canonical_swimmer):decodeURIComponent(swimmerName);document.getElementById('swimmerName').textContent=display||'Swimmer';const clubs=uniqueSorted(swimmerRows.map(r=>r.club)).join(' • '),seasons=uniqueSorted(swimmerRows.map(r=>r.season)).join(', ');document.getElementById('swimmerMeta').textContent=`${clubs||'Unknown club'}${seasons?' · '+seasons:''}`;document.getElementById('kpiRaces').textContent=swimmerRows.length;document.getElementById('kpiEvents').textContent=uniqueSorted(swimmerRows.map(r=>canonicalEventKey(r.event))).length;document.getElementById('kpiPBs').textContent=swimmerRows.some(r=>isJackName(r.canonical_swimmer))?JACK_BASELINES.length:uniqueSorted(swimmerRows.map(r=>canonicalEventKey(r.event))).length;document.getElementById('bestBtn').addEventListener('click',e=>{e.preventDefault();mode='best';render();});document.getElementById('resultsBtn').addEventListener('click',e=>{e.preventDefault();mode='results';render();});document.getElementById('progressBtn').addEventListener('click',e=>{e.preventDefault();mode='progress';render();});render();}).catch(err=>{console.error(err);document.getElementById('sectionTitle').textContent='Failed to load data';document.getElementById('tableBody').innerHTML='<tr><td class="empty">Could not load the CSV file.</td></tr>';});</script></body></html>
