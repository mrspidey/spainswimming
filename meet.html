<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Meet</title><script src="data/app.js"></script></head><body><div class="wrap"><div class="nav"><a href="index.html">Home</a><a href="search.html">Search</a><a href="clubs.html">Clubs</a></div><a href="index.html">← Back to latest meets</a><div id="meetHero" style="margin-top:12px"></div><div id="eventList" class="stack" style="margin-top:14px"></div></div><script>injectStyles();const id=getParam('id');loadRows().then(rows=>{const meet=groupMeets(rows).find(m=>m.id===id);if(!meet){document.getElementById('meetHero').innerHTML='<div class="card panel"><div class="empty">Meet not found.</div></div>';return;}document.getElementById('meetHero').innerHTML=`<div class="card panel"><h1>${escapeHtml(meet.meet)}</h1><div class="muted">${escapeHtml(meet.venue)} · ${escapeHtml(meet.date)} · ${escapeHtml(meet.province || meet.region)}</div><div style="margin-top:8px"><span class="badge">${meet.eventCount} events</span><span class="badge">${meet.swimmerCount} swimmers</span></div></div>`;const events=uniqueSorted(meet.rows.map(r=>r.event)).map(ev=>meet.rows.find(r=>r.event===ev)).sort((a,b)=>(a.distance||0)-(b.distance||0)||a.event.localeCompare(b.event,'es'));document.getElementById('eventList').innerHTML=events.map(r=>{const count=meet.rows.filter(x=>x.event===r.event).length;return `<div class="listCard"><h3><a href="event.html?id=${encodeURIComponent(eventId(r))}">${escapeHtml(r.event)}</a></h3><div class="muted">${escapeHtml(r.stroke)} · ${count} results</div><div style="margin-top:10px"><a href="event.html?id=${encodeURIComponent(eventId(r))}">Open event →</a></div></div>`;}).join('');}).catch(err=>{console.error(err);document.getElementById('meetHero').innerHTML='<div class="card panel"><div class="empty">Could not load the CSV file.</div></div>';});</script></body></html>
