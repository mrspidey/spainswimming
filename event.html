<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Event</title><script src="data/app.js"></script></head><body><div class="wrap"><div class="nav"><a href="index.html">Home</a><a href="search.html">Search</a><a href="clubs.html">Clubs</a></div><a id="backMeet" href="index.html">← Back to meet</a><div id="eventHero" style="margin-top:12px"></div><div class="card panel" style="margin-top:14px"><div class="tableWrap"><table><thead><tr><th>Rank</th><th>Swimmer</th><th>Club</th><th>Time</th></tr></thead><tbody id="eventResults"></tbody></table></div></div></div><script>injectStyles();const id=getParam('id');loadRows().then(rows=>{const row=rows.find(r=>eventId(r)===id);if(!row){document.getElementById('eventHero').innerHTML='<div class="card panel"><div class="empty">Event not found.</div></div>';return;}const results=rows.filter(r=>eventId(r)===id).sort((a,b)=>(a.rank||9999)-(b.rank||9999)||a.timeSeconds-b.timeSeconds);document.getElementById('backMeet').href=`meet.html?id=${encodeURIComponent(meetId(row))}`;document.getElementById('eventHero').innerHTML=`<div class="card panel"><h1>${escapeHtml(eventDisplay(row.event))}</h1><div class="muted">${escapeHtml(row.meet)} · ${escapeHtml(row.venue)} · ${escapeHtml(row.date)}</div></div>`;document.getElementById('eventResults').innerHTML=results.map(r=>`<tr><td data-label="Rank" class="rank">${r.rank||''}</td><td data-label="Swimmer"><a href="swimmer.html?name=${encodeURIComponent(r.canonical_swimmer)}">${escapeHtml(displaySwimmerName(r.canonical_swimmer))}</a></td><td data-label="Club">${escapeHtml(r.club)}</td><td data-label="Time">${escapeHtml(r.time)}</td></tr>`).join('');}).catch(err=>{console.error(err);document.getElementById('eventHero').innerHTML='<div class="card panel"><div class="empty">Could not load the CSV file.</div></div>';});</script></body></html>
