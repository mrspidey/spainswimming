<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spain Swimming Results (Boys 2014)</title>
  <script src="data/app.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="index.html" class="active">Home</a>
      <a href="search.html">Search</a>
      <a href="clubs.html">Clubs</a>
    </div>

    <div class="card panel" style="margin-bottom:14px">
      <div class="hero">
        <div>
          <h1>Spain Swimming Results (Boys 2014)</h1>
          <div class="muted">Latest completed meets from the merged master dataset.</div>
        </div>
        <div class="kpiGrid" style="max-width:640px;width:100%">
          <div class="kpi">
            <div class="label">Completed meets</div>
            <div class="value" id="kpiMeets">0</div>
          </div>
          <div class="kpi">
            <div class="label">Athletes</div>
            <div class="value" id="kpiAthletes">0</div>
          </div>
          <div class="kpi">
            <div class="label">Swims</div>
            <div class="value" id="kpiSwims">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card panel" style="margin-bottom:14px">
      <div class="grid" style="grid-template-columns:1.2fr .8fr;gap:12px">
        <input id="meetSearch" type="text" placeholder="Search meet or venue" />
        <select id="provinceFilter">
          <option value="">All provinces</option>
        </select>
      </div>
    </div>

    <div class="card panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px;flex-wrap:wrap">
        <h2 style="margin:0">Latest completed meets</h2>
        <div class="small" id="meetCount">0 meets</div>
      </div>
      <div id="meetList" class="stack"></div>
    </div>
  </div>

  <script>
    injectStyles();

    function humanDate(v){
      const s = String(v || "").trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
        const [y,m,d] = s.split("-");
        return `${d}/${m}/${y}`;
      }
      return s;
    }

    function preferLongest(values){
      const arr = [...new Set(values.filter(Boolean))];
      if (!arr.length) return "";
      arr.sort((a,b) => b.length - a.length || a.localeCompare(b, "es"));
      return arr[0];
    }

    function groupMeetRows(rows){
      const firstPass = new Map();

      rows.forEach(r => {
        const key = normalize([
          r.meet,
          r.dateIso || r.date
        ].join("|"));

        if (!firstPass.has(key)) firstPass.set(key, []);
        firstPass.get(key).push(r);
      });

      const grouped = [...firstPass.values()].map(group => {
        const first = group[0];
        return {
          id: meetId(first),
          meet: preferLongest(group.map(x => x.meet)),
          venue: preferLongest(group.map(x => x.venue)),
          province: preferLongest(group.map(x => x.province)),
          dateIso: preferLongest(group.map(x => x.dateIso || x.date)),
          rows: group,
          swimmerCount: uniqueSorted(group.map(x => x.canonical_swimmer)).length,
          eventCount: uniqueSorted(group.map(x => canonicalEventKey(x.event))).length
        };
      });

      const secondPass = new Map();

      grouped.forEach(m => {
        const mergeKey = normalize([
          m.venue,
          m.dateIso,
          m.eventCount,
          m.swimmerCount
        ].join("|"));

        if (!secondPass.has(mergeKey)) secondPass.set(mergeKey, []);
        secondPass.get(mergeKey).push(m);
      });

      return [...secondPass.values()].map(cluster => {
        if (cluster.length === 1) return cluster[0];

        const richest = [...cluster].sort((a,b) =>
          b.meet.length - a.meet.length || a.meet.localeCompare(b.meet, "es")
        )[0];

        return richest;
      }).sort((a,b) =>
        String(b.dateIso).localeCompare(String(a.dateIso)) ||
        a.meet.localeCompare(b.meet, "es")
      );
    }

    function renderMeetList(allRows){
      document.getElementById("kpiSwims").textContent = allRows.length;
      document.getElementById("kpiAthletes").textContent =
        uniqueSorted(allRows.map(r => r.canonical_swimmer)).length;

      const grouped = groupMeetRows(allRows);
      document.getElementById("kpiMeets").textContent = grouped.length;

      const provinces = uniqueSorted(grouped.map(x => x.province).filter(Boolean));
      const provinceFilter = document.getElementById("provinceFilter");
      provinceFilter.innerHTML =
        `<option value="">All provinces</option>` +
        provinces.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join("");

      const meetSearch = document.getElementById("meetSearch");
      const meetList = document.getElementById("meetList");
      const meetCount = document.getElementById("meetCount");

      function draw(){
        const q = normalize(meetSearch.value);
        const p = provinceFilter.value;

        const filtered = grouped.filter(m => {
          const hay = normalize([m.meet, m.venue, m.province].join(" "));
          if (q && !hay.includes(q)) return false;
          if (p && m.province !== p) return false;
          return true;
        });

        meetCount.textContent = `${filtered.length} meet${filtered.length === 1 ? "" : "s"}`;

        if (!filtered.length) {
          meetList.innerHTML = `<div class="empty">No meets found.</div>`;
          return;
        }

        meetList.innerHTML = filtered.map(m => `
          <div class="listCard">
            <h3>${escapeHtml(m.meet)}</h3>
            <div class="muted">${escapeHtml(m.venue)} · ${escapeHtml(humanDate(m.dateIso))}</div>
            <div style="margin-top:10px">
              <span class="badge">${escapeHtml(m.province || "Spain")}</span>
              <span class="badge">${m.eventCount} events</span>
              <span class="badge">${m.swimmerCount} swimmers</span>
            </div>
            <div style="margin-top:12px">
              <a href="meet.html?id=${encodeURIComponent(m.id)}">View results →</a>
            </div>
          </div>
        `).join("");
      }

      meetSearch.addEventListener("input", draw);
      provinceFilter.addEventListener("change", draw);
      draw();
    }

    loadRows()
      .then(renderMeetList)
      .catch(err => {
        console.error(err);
        document.body.insertAdjacentHTML("beforeend", `<div class="wrap"><div class="card panel">Could not load the CSV file.</div></div>`);
      });
  </script>
</body>
</html>
