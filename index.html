<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spain Swimming Results (Boys 2014)</title>
  <script src="data/app.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="topnav">
      <a class="navbtn active" href="index.html">Home</a>
      <a class="navbtn" href="search.html">Search</a>
      <a class="navbtn" href="clubs.html">Clubs</a>
    </div>

    <div class="hero card">
      <div>
        <h1>Spain Swimming Results (Boys 2014)</h1>
        <div class="muted">Latest completed meets from the merged master dataset.</div>
      </div>
      <div class="hero-stats">
        <div class="kpi">
          <div class="label">Completed meets</div>
          <div class="value" id="kpiMeets">0</div>
        </div>
        <div class="kpi">
          <div class="label">Athletes</div>
          <div class="value" id="kpiAthletes">0</div>
        </div>
        <div class="kpi">
          <div class="label">Swims</div>
          <div class="value" id="kpiSwims">0</div>
        </div>
      </div>
    </div>

    <div class="filters card">
      <div class="filters-grid">
        <input id="meetSearch" class="input" type="text" placeholder="Search meet or venue" />
        <select id="provinceFilter" class="input">
          <option value="">All provinces</option>
        </select>
      </div>
    </div>

    <div class="section-head">
      <h2>Latest completed meets</h2>
      <div class="subtle" id="resultCount">0 meets</div>
    </div>

    <div id="meetList" class="meet-grid"></div>
  </div>

  <script>
    injectStyles();

    const indexStyles = `
      :root{
        --bg:#F7FBFF;
        --card:#FFFFFF;
        --border:#DCEAF7;
        --text:#0F172A;
        --muted:#5B6B7F;
        --primary:#0EA5E9;
        --primary-hover:#0284C7;
        --soft:#E0F2FE;
        --shadow:0 1px 2px rgba(15,23,42,.04);
        --radius:14px;
      }

      * { box-sizing: border-box; }

      body{
        margin:0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:var(--bg);
        color:var(--text);
      }

      .wrap{
        max-width:1240px;
        margin:0 auto;
        padding:24px;
      }

      .topnav{
        display:flex;
        gap:10px;
        margin-bottom:18px;
      }

      .navbtn{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        border-radius:12px;
        border:1px solid var(--border);
        background:#fff;
        color:var(--text);
        padding:10px 16px;
        font-weight:600;
        text-decoration:none;
      }

      .navbtn:hover{
        border-color:#c7def3;
        background:#fff;
      }

      .navbtn.active{
        background:var(--soft);
        color:#075985;
        border-color:#b8def8;
      }

      .card{
        background:var(--card);
        border:1px solid var(--border);
        border-radius:var(--radius);
        box-shadow:var(--shadow);
      }

      .hero{
        padding:20px;
        display:grid;
        grid-template-columns: 1.2fr .9fr;
        gap:18px;
        align-items:start;
      }

      h1{
        margin:0 0 8px;
        font-size:40px;
        line-height:1;
        letter-spacing:-.03em;
        font-weight:800;
      }

      h2{
        margin:0;
        font-size:20px;
        letter-spacing:-.02em;
      }

      .muted{
        color:var(--muted);
      }

      .subtle{
        color:var(--muted);
        font-size:13px;
      }

      .hero-stats{
        display:grid;
        grid-template-columns: repeat(3, 1fr);
        gap:12px;
      }

      .kpi{
        border:1px solid var(--border);
        border-radius:14px;
        padding:14px 16px;
        background:#fff;
      }

      .kpi .label{
        color:var(--muted);
        font-size:12px;
        margin-bottom:6px;
      }

      .kpi .value{
        font-size:22px;
        font-weight:700;
      }

      .filters{
        margin-top:16px;
        padding:16px;
      }

      .filters-grid{
        display:grid;
        grid-template-columns: 1.4fr .7fr;
        gap:12px;
      }

      .input{
        width:100%;
        border:1px solid var(--border);
        background:#fff;
        border-radius:12px;
        padding:12px 14px;
        font-size:14px;
        color:var(--text);
      }

      .section-head{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin:20px 0 14px;
      }

      .meet-grid{
        display:grid;
        grid-template-columns:1fr;
        gap:14px;
      }

      .meet-card{
        padding:18px;
      }

      .meet-top{
        display:flex;
        justify-content:space-between;
        gap:12px;
        align-items:flex-start;
        margin-bottom:12px;
      }

      .meet-title{
        font-size:20px;
        font-weight:700;
        letter-spacing:-.02em;
        margin:0 0 6px;
      }

      .meet-meta{
        color:var(--muted);
        font-size:14px;
      }

      .pill-row{
        display:flex;
        flex-wrap:wrap;
        gap:8px;
        margin-top:10px;
      }

      .pill{
        display:inline-flex;
        align-items:center;
        padding:4px 8px;
        border-radius:999px;
        background:var(--soft);
        color:#075985;
        font-size:12px;
        font-weight:700;
        border:1px solid #b8def8;
      }

      .meet-actions{
        margin-top:14px;
        display:flex;
        gap:10px;
        flex-wrap:wrap;
      }

      .btn{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        border-radius:10px;
        padding:10px 14px;
        font-size:14px;
        font-weight:600;
        text-decoration:none;
        border:1px solid transparent;
      }

      .btn-primary{
        background:var(--primary);
        color:#fff;
      }

      .btn-primary:hover{
        background:var(--primary-hover);
      }

      .empty{
        padding:20px;
        text-align:center;
        color:var(--muted);
      }

      @media (max-width: 900px){
        .hero{ grid-template-columns:1fr; }
        .hero-stats{ grid-template-columns:1fr 1fr 1fr; }
        .filters-grid{ grid-template-columns:1fr; }
      }

      @media (max-width: 620px){
        .wrap{ padding:14px; }
        h1{ font-size:32px; }
        .hero-stats{ grid-template-columns:1fr; }
        .meet-top{ flex-direction:column; }
      }
    `;

    document.head.insertAdjacentHTML("beforeend", `<style>${indexStyles}</style>`);

    function humanDate(dateIso){
      const v = String(dateIso || "").trim();
      if (!v) return "";
      if (/^\\d{4}-\\d{2}-\\d{2}$/.test(v)) {
        const [y,m,d] = v.split("-");
        return `${d}/${m}/${y}`;
      }
      return v;
    }

    function preferMeetName(names){
      const cleaned = [...new Set(names.filter(Boolean))];
      if (!cleaned.length) return "";
      cleaned.sort((a,b) => b.length - a.length || a.localeCompare(b, "es"));
      return cleaned[0];
    }

    function groupMeetRows(rows){
      const map = new Map();

      rows.forEach(r => {
        const key = normalize([
          r.meet,
          r.dateIso || r.date
        ].join("|"));

        if (!map.has(key)) map.set(key, []);
        map.get(key).push(r);
      });

      return [...map.values()].map(group => {
        const first = group[0];
        const meetName = preferMeetName(group.map(r => r.meet));
        const venue = preferMeetName(group.map(r => r.venue));
        const province = preferMeetName(group.map(r => r.province));
        const dateIso = preferMeetName(group.map(r => r.dateIso || r.date));
        const uniqueEvents = uniqueSorted(group.map(r => canonicalEventKey(r.event)));
        const uniqueSwimmers = uniqueSorted(group.map(r => r.canonical_swimmer));

        return {
          id: meetId(first),
          meet: meetName,
          venue,
          province,
          dateIso,
          eventCount: uniqueEvents.length,
          swimmerCount: uniqueSwimmers.length,
          rows: group
        };
      }).sort((a,b) =>
        String(b.dateIso).localeCompare(String(a.dateIso)) ||
        a.meet.localeCompare(b.meet, "es")
      );
    }

    function renderHome(rows){
      document.getElementById("kpiSwims").textContent = rows.length;
      document.getElementById("kpiAthletes").textContent =
        uniqueSorted(rows.map(r => r.canonical_swimmer)).length;

      const provinces = uniqueSorted(rows.map(r => r.province).filter(Boolean));
      const provinceFilter = document.getElementById("provinceFilter");
      provinceFilter.innerHTML =
        `<option value="">All provinces</option>` +
        provinces.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join("");

      const allMeets = groupMeetRows(rows);
      document.getElementById("kpiMeets").textContent = allMeets.length;

      const searchInput = document.getElementById("meetSearch");
      const list = document.getElementById("meetList");
      const count = document.getElementById("resultCount");

      function draw(){
        const q = normalize(searchInput.value);
        const p = provinceFilter.value;

        const filtered = allMeets.filter(m => {
          const matchesQ = !q || normalize(`${m.meet} ${m.venue}`).includes(q);
          const matchesP = !p || m.province === p;
          return matchesQ && matchesP;
        });

        count.textContent = `${filtered.length} meet${filtered.length === 1 ? "" : "s"}`;

        if (!filtered.length) {
          list.innerHTML = `<div class="card empty">No meets found.</div>`;
          return;
        }

        list.innerHTML = filtered.map(m => `
          <div class="card meet-card">
            <div class="meet-top">
              <div>
                <div class="meet-title">${escapeHtml(m.meet)}</div>
                <div class="meet-meta">${escapeHtml(m.venue)} · ${humanDate(m.dateIso)}</div>
                <div class="pill-row">
                  <span class="pill">${escapeHtml(m.province || "Spain")}</span>
                  <span class="pill">${m.eventCount} event${m.eventCount === 1 ? "" : "s"}</span>
                  <span class="pill">${m.swimmerCount} swimmer${m.swimmerCount === 1 ? "" : "s"}</span>
                </div>
              </div>
            </div>
            <div class="meet-actions">
              <a class="btn btn-primary" href="meet.html?id=${encodeURIComponent(m.id)}">View results</a>
            </div>
          </div>
        `).join("");
      }

      searchInput.addEventListener("input", draw);
      provinceFilter.addEventListener("change", draw);
      draw();
    }

    loadRows().then(renderHome).catch(err => {
      console.error(err);
      document.getElementById("meetList").innerHTML =
        `<div class="card empty">Could not load homepage data.</div>`;
    });
  </script>
</body>
</html>
