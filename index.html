<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spain Swimming Rankings (Boys 2014)</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--line:#e5e7eb;--text:#0f172a;--muted:#64748b;--blue:#2563eb}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1280px;margin:0 auto;padding:14px}
    h1{margin:0 0 14px;font-size:clamp(32px,5vw,56px);line-height:1.05}
    .layout{display:grid;grid-template-columns:320px 1fr;gap:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .panel{padding:16px}
    .panel h2{margin:0 0 12px;font-size:18px}
    .stack{display:grid;gap:10px}
    input,select,button{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #cbd5e1;background:#fff;font:inherit;color:inherit}
    button{background:var(--blue);color:#fff;border:none;font-weight:700;cursor:pointer}
    .seg{display:flex;gap:8px;flex-wrap:wrap}
    .seg button{width:auto;background:#fff;border:1px solid var(--line);color:var(--text)}
    .seg button.active{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .muted{color:var(--muted);font-size:14px}
    .tableWrap{overflow:auto;border:1px solid var(--line);border-radius:16px}
    table{width:100%;min-width:920px;border-collapse:collapse;background:#fff}
    th,td{padding:12px 10px;border-bottom:1px solid #eef2f7;text-align:left;vertical-align:top}
    th{background:#f8fafc;font-size:14px}
    td{font-size:14px}
    .rank{font-weight:700}
    .saveBtn{width:auto;padding:10px 12px;border-radius:14px;background:#fff;border:1px solid var(--line);color:var(--text)}
    .saveBtn.saved{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#f1f5f9;font-size:12px;margin:0 6px 6px 0}
    .small{font-size:12px;color:var(--muted)}
    .empty{padding:18px;color:var(--muted)}
    .swimmerBtn{background:none;border:none;padding:0;color:var(--blue);font:inherit;cursor:pointer;text-align:left}
    @media (max-width:900px){.layout{grid-template-columns:1fr}.wrap{padding:10px}.panel{padding:14px}h1{font-size:26px}th,td{padding:10px 8px}}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Spain Swimming Rankings (Boys 2014)</h1>
  <div class="layout">
    <div class="stack">
      <div class="card panel">
        <h2>Filters</h2>
        <div class="stack">
          <input id="searchBox" placeholder="Search swimmer or club" />
          <select id="seasonFilter"><option value="">All seasons</option></select>
          <select id="provinceFilter"><option value="">All provinces</option></select>
          <select id="venueFilter"><option value="">All venues</option></select>
          <select id="clubFilter"><option value="">All clubs</option></select>
          <select id="strokeFilter"><option value="">All strokes</option></select>
          <select id="eventFilter"><option value="">All events</option></select>
          <button id="clearBtn">Clear filters</button>
        </div>
      </div>
      <div class="card panel"><h2>Saved swimmers</h2><div id="savedSwimmers" class="muted">No saved swimmers yet.</div></div>
      <div class="card panel"><h2>Possible duplicate links</h2><div id="duplicateLinks" class="muted">No auto-linked variants in the current slice.</div></div>
    </div>
    <div class="stack">
      <div class="card panel">
        <div class="seg"><button id="standingsBtn" class="active">Best times</button><button id="resultsBtn">All results</button></div>
        <p class="muted" style="margin:12px 0 0">Best times ranks swimmers within each event using each swimmer's fastest result only.</p>
      </div>
      <div class="card panel">
        <h2 id="tableTitle">Event standings</h2>
        <div class="tableWrap"><table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div>
      </div>
    </div>
  </div>
</div>

<script>
const DATA_URL = "data/spain_boys_2014_results_master.csv";
let rows = [], filtered = [], standings = [], viewMode = "standings";
let saved = JSON.parse(localStorage.getItem("swim-saved-swimmers") || "[]");

function parseCsvLine(line){
  const out=[]; let cur="", inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i], next=line[i+1];
    if(ch === '"'){
      if(inQuotes && next === '"'){ cur += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if(ch === ',' && !inQuotes){
      out.push(cur); cur="";
    } else cur += ch;
  }
  out.push(cur); return out;
}
function parseCsv(text){
  const clean = text.replace(/^\uFEFF/, "").replace(/\r/g,"");
  const lines = clean.split("\n").filter(x => x.trim() !== "");
  if(!lines.length) return [];
  const headers = parseCsvLine(lines[0]).map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = parseCsvLine(line);
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i] ?? "").trim());
    const event = obj["Event"] || "";
    const stroke = obj["Stroke"] || "";
    const canonical = obj["Canonical_Swimmer"] || obj["Canonical"] || obj["Swimmer_Raw"] || "";
    const swimmerRaw = obj["Swimmer_Raw"] || "";
    const club = obj["Club"] || "";
    const meet = obj["Meet"] || "";
    const venue = obj["Venue"] || "";
    const province = obj["Province"] || "";
    const region = obj["Region"] || "";
    const season = obj["Season"] || "";
    const date = obj["Date"] || obj["Date_ISO"] || "";
    const time = obj["Time"] || "";
    const rank = Number(obj["Rank"] || 0);
    const distance = Number(obj["Distance_m"] || 0);
    return {
      season, province, region, meet, venue, event, stroke, distance,
      swimmer_raw: swimmerRaw, canonical_swimmer: canonical, club, time, rank, date,
      timeSeconds: timeToSeconds(time)
    };
  }).filter(r => r.event && r.canonical_swimmer && r.club && r.time);
}
function timeToSeconds(t){
  if(!t) return Infinity;
  const p = String(t).trim().split(":");
  if(p.length === 2) return Number(p[0]) * 60 + Number(p[1]);
  if(p.length === 3) return Number(p[0]) * 3600 + Number(p[1]) * 60 + Number(p[2]);
  return Number(t);
}
function normalize(s){
  return String(s||"").toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
function similarity(a,b){
  const aa=normalize(a), bb=normalize(b); if(!aa||!bb) return 0; if(aa===bb) return 100;
  const ap=aa.split(' '), bp=bb.split(' '), as=ap[ap.length-1]||'', bs=bp[bp.length-1]||'', ag=ap[0]||'', bg=bp[0]||'';
  let score=0; if(as&&as===bs) score+=55; if(ag&&bg&&(ag===bg||ag[0]===bg[0])) score+=25;
  score += [...new Set(ap.filter(x => bp.includes(x)))].length * 10;
  return Math.min(score,100);
}
function uniqueSorted(items){ return [...new Set(items.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es')); }
function fillSelect(id, values, current){
  const el = document.getElementById(id);
  const label = el.options[0]?.textContent || "All";
  el.innerHTML = "";
  const first = document.createElement("option");
  first.value = ""; first.textContent = label; el.appendChild(first);
  values.forEach(v => {
    const o = document.createElement("option");
    o.value = v; o.textContent = v;
    if(v === current) o.selected = true;
    el.appendChild(o);
  });
}
function getFilters(){
  return {
    q: document.getElementById("searchBox").value.trim(),
    season: document.getElementById("seasonFilter").value,
    province: document.getElementById("provinceFilter").value,
    venue: document.getElementById("venueFilter").value,
    club: document.getElementById("clubFilter").value,
    stroke: document.getElementById("strokeFilter").value,
    event: document.getElementById("eventFilter").value
  };
}
function applyFilters(){
  const f = getFilters();
  filtered = rows
    .filter(r => !f.season || r.season === f.season)
    .filter(r => !f.province || r.province === f.province)
    .filter(r => !f.venue || r.venue === f.venue)
    .filter(r => !f.club || r.club === f.club)
    .filter(r => !f.stroke || r.stroke === f.stroke)
    .filter(r => !f.event || r.event === f.event)
    .filter(r => {
      if(!f.q) return true;
      const q = normalize(f.q);
      return [r.canonical_swimmer, r.swimmer_raw, r.club, r.meet, r.event, r.venue, r.province].some(v => normalize(v).includes(q));
    });

  const eventOptions = uniqueSorted(rows.filter(r => !f.stroke || r.stroke === f.stroke).map(r => r.event))
    .sort((a,b) => ((rows.find(r => r.event === a)?.distance || 0) - (rows.find(r => r.event === b)?.distance || 0)) || a.localeCompare(b,'es'));
  if(f.event && !eventOptions.includes(f.event)){ document.getElementById("eventFilter").value = ""; return applyFilters(); }
  fillSelect("eventFilter", eventOptions, document.getElementById("eventFilter").value);

  const byEvent = new Map();
  filtered.forEach(r => {
    if(!byEvent.has(r.event)) byEvent.set(r.event, new Map());
    const swimmers = byEvent.get(r.event);
    const existing = swimmers.get(r.canonical_swimmer);
    if(!existing || r.timeSeconds < existing.timeSeconds) swimmers.set(r.canonical_swimmer, r);
  });
  standings = [];
  [...byEvent.entries()].forEach(([event, swimmerMap]) => {
    const list = [...swimmerMap.values()].sort((a,b) => a.timeSeconds - b.timeSeconds || a.canonical_swimmer.localeCompare(b.canonical_swimmer,'es'));
    list.forEach((r,i) => standings.push({...r, standingRank:i+1}));
  });
  standings.sort((a,b) => (a.distance||0) - (b.distance||0) || a.event.localeCompare(b.event,'es') || a.standingRank - b.standingRank);

  renderSaved(); renderDuplicates(); renderTable();
}
function renderSaved(){
  const box = document.getElementById("savedSwimmers");
  box.innerHTML = saved.length ? saved.map(n => `<span class="badge">${escapeHtml(n)}</span>`).join("") : '<div class="muted">No saved swimmers yet.</div>';
}
function renderDuplicates(){
  const box = document.getElementById("duplicateLinks");
  const grouped = {};
  rows.forEach(r => { grouped[r.club] = grouped[r.club] || []; grouped[r.club].push(r.swimmer_raw); });
  const suggestions = [];
  Object.entries(grouped).forEach(([club,names]) => {
    const uniq = [...new Set(names.filter(Boolean))];
    for(let i=0;i<uniq.length;i++) for(let j=i+1;j<uniq.length;j++){
      const score = similarity(uniq[i], uniq[j]);
      if(score >= 80 && uniq[i] !== uniq[j]) suggestions.push({club,names:[uniq[i], uniq[j]],score});
    }
  });
  box.innerHTML = suggestions.length ? suggestions.slice(0,10).map(s => `<div style="border:1px solid var(--line);border-radius:14px;padding:10px;margin-bottom:10px"><div style="font-weight:700">${escapeHtml(s.club)}</div><div class="small">Similarity ${s.score}%</div><div style="margin-top:6px">${s.names.map(n => `<span class="badge">${escapeHtml(n)}</span>`).join("")}</div></div>`).join("") : '<div class="muted">No auto-linked variants in the current slice.</div>';
}
function toggleSaved(name){
  if(saved.includes(name)) saved = saved.filter(x => x !== name); else saved.push(name);
  localStorage.setItem("swim-saved-swimmers", JSON.stringify(saved));
  renderSaved(); renderTable();
}
function renderTable(){
  const head = document.getElementById("tableHead"), body = document.getElementById("tableBody"), title = document.getElementById("tableTitle");
  if(viewMode === "standings"){
    title.textContent = `Event standings (${standings.length})`;
    head.innerHTML = `<tr><th>Rank</th><th>Event</th><th>Swimmer</th><th>Club</th><th>Best time</th><th>Meet</th><th>Date</th><th style="text-align:right">Save</th></tr>`;
    body.innerHTML = standings.length ? standings.map(r => `<tr><td class="rank">${r.standingRank}</td><td>${escapeHtml(r.event)}</td><td><button class="swimmerBtn" onclick="searchSwimmer('${escapeJs(r.canonical_swimmer)}')">${escapeHtml(r.canonical_swimmer)}</button></td><td>${escapeHtml(r.club)}</td><td>${escapeHtml(r.time)}</td><td>${escapeHtml(r.meet)}<div class="small">${escapeHtml(r.venue)}</div></td><td>${escapeHtml(r.date)}</td><td style="text-align:right"><button class="saveBtn ${saved.includes(r.canonical_swimmer)?'saved':''}" onclick="toggleSaved('${escapeJs(r.canonical_swimmer)}')">${saved.includes(r.canonical_swimmer)?'★':'☆'}</button></td></tr>`).join("") : `<tr><td colspan="8" class="empty">No rows found for the current filters.</td></tr>`;
  } else {
    title.textContent = `All results (${filtered.length})`;
    const sorted = [...filtered].sort((a,b) => (a.distance||0) - (b.distance||0) || a.event.localeCompare(b.event,'es') || a.timeSeconds - b.timeSeconds || String(b.date).localeCompare(String(a.date)));
    head.innerHTML = `<tr><th>Date</th><th>Event</th><th>Swimmer</th><th>Club</th><th>Meet</th><th>Time</th></tr>`;
    body.innerHTML = sorted.length ? sorted.map(r => `<tr><td>${escapeHtml(r.date)}</td><td>${escapeHtml(r.event)}</td><td><button class="swimmerBtn" onclick="searchSwimmer('${escapeJs(r.canonical_swimmer)}')">${escapeHtml(r.canonical_swimmer)}</button>${r.swimmer_raw !== r.canonical_swimmer ? `<div class="small">raw: ${escapeHtml(r.swimmer_raw)}</div>` : ""}</td><td>${escapeHtml(r.club)}</td><td>${escapeHtml(r.meet)}<div class="small">${escapeHtml(r.venue)}</div></td><td>${escapeHtml(r.time)}</td></tr>`).join("") : `<tr><td colspan="6" class="empty">No rows found for the current filters.</td></tr>`;
  }
  document.getElementById("standingsBtn").classList.toggle("active", viewMode === "standings");
  document.getElementById("resultsBtn").classList.toggle("active", viewMode === "results");
}
function searchSwimmer(name){ document.getElementById("searchBox").value = name; applyFilters(); }
function escapeHtml(s){ return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeJs(s){ return String(s ?? "").replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function initFilters(){
  fillSelect("seasonFilter", uniqueSorted(rows.map(r => r.season)), "");
  fillSelect("provinceFilter", uniqueSorted(rows.map(r => r.province)), "");
  fillSelect("venueFilter", uniqueSorted(rows.map(r => r.venue)), "");
  fillSelect("clubFilter", uniqueSorted(rows.map(r => r.club)), "");
  fillSelect("strokeFilter", uniqueSorted(rows.map(r => r.stroke)), "");
  fillSelect("eventFilter", uniqueSorted(rows.map(r => r.event)).sort((a,b) => ((rows.find(r => r.event === a)?.distance || 0) - (rows.find(r => r.event === b)?.distance || 0)) || a.localeCompare(b,'es')), "");
  ["searchBox","seasonFilter","provinceFilter","venueFilter","clubFilter","strokeFilter","eventFilter"].forEach(id => document.getElementById(id).addEventListener(id === "searchBox" ? "input" : "change", applyFilters));
  document.getElementById("clearBtn").addEventListener("click", () => {
    document.getElementById("searchBox").value = "";
    ["seasonFilter","provinceFilter","venueFilter","clubFilter","strokeFilter","eventFilter"].forEach(id => document.getElementById(id).value = "");
    applyFilters();
  });
  document.getElementById("standingsBtn").addEventListener("click", () => { viewMode = "standings"; renderTable(); });
  document.getElementById("resultsBtn").addEventListener("click", () => { viewMode = "results"; renderTable(); });
}
fetch(DATA_URL).then(r => r.text()).then(text => {
  rows = parseCsv(text);
  initFilters();
  applyFilters();
}).catch(err => {
  document.getElementById("tableTitle").textContent = "Failed to load data";
  document.getElementById("tableHead").innerHTML = "";
  document.getElementById("tableBody").innerHTML = `<tr><td class="empty">Could not load ${DATA_URL}. Check that the CSV exists and the filename is correct.</td></tr>`;
  console.error(err);
});
</script>
</body>
</html>
