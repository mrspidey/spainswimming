<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Clubs</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--line:#e5e7eb;--text:#0f172a;--muted:#64748b;--blue:#2563eb}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)} a{color:var(--blue);text-decoration:none}
.wrap{max-width:1280px;margin:0 auto;padding:12px} h1{margin:0 0 14px;font-size:clamp(28px,5vw,56px);line-height:1.05} .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 1px 2px rgba(0,0,0,.04)} .panel{padding:14px} .stack{display:grid;gap:10px} input{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #cbd5e1;background:#fff;font:inherit;color:inherit}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#f1f5f9;font-size:12px;margin:0 6px 6px 0}.small{font-size:12px;color:var(--muted)} .clubCard{padding:12px;border:1px solid var(--line);border-radius:16px;background:#fff}
</style></head><body><div class="wrap"><a href="index.html">← Back to rankings</a><h1>Club directory</h1><div class="card panel"><input id="clubSearch" placeholder="Search club"/></div><div id="clubList" class="stack" style="margin-top:14px"></div></div>
<script>
const DATA_URL = "data/spain_boys_2014_results_master.csv";
function parseCsvLine(line){ const out=[]; let cur="",q=false; for(let i=0;i<line.length;i++){ const ch=line[i],nx=line[i+1]; if(ch==='"'){ if(q&&nx==='"'){cur+='"'; i++;} else q=!q; } else if(ch===','&&!q){ out.push(cur); cur=''; } else cur+=ch; } out.push(cur); return out; }
function pick(obj, keys){ for(const k of keys){ if(obj[k] !== undefined && String(obj[k]).trim() !== "") return String(obj[k]).trim(); } return ""; }
function parseCsv(text){ const clean=text.replace(/^\uFEFF/,'').replace(/\r/g,''); const lines=clean.split('\n').filter(x=>x.trim()!==''); if(!lines.length) return []; const headers=parseCsvLine(lines[0]).map(h=>h.trim()); return lines.slice(1).map(line=>{ const vals=parseCsvLine(line); const obj={}; headers.forEach((h,i)=>obj[h]=(vals[i]??'').trim()); return {club:pick(obj,['Club','club']), canonical_swimmer:pick(obj,['Canonical_Swimmer','Canonical','canonical_swimmer']), swimmer_raw:pick(obj,['Swimmer_Raw','Swimmer'])}; }).filter(r=>r.club&&r.canonical_swimmer); }
function normalize(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function displaySwimmerName(name){ if(!name) return ''; if(name.includes(',')){ const p=name.split(','); return `${p[1].trim()} ${p[0].trim()}`.replace(/\s+/g,' '); } return name; }
async function loadRows(){ const text=await fetch(DATA_URL,{cache:'no-store'}).then(r=>r.text()); return parseCsv(text); }
let rows=[];
function renderClubs(q=''){ const list=document.getElementById('clubList'); const clubs=[...new Set(rows.map(r=>r.club))].filter(Boolean).sort((a,b)=>a.localeCompare(b,'es')); const filtered=clubs.filter(c=>!q||normalize(c).includes(normalize(q))); list.innerHTML=filtered.map(club=>{ const clubRows=rows.filter(r=>r.club===club); const swimmers=[...new Set(clubRows.map(r=>r.canonical_swimmer))].sort((a,b)=>a.localeCompare(b,'es')); return `<div class="clubCard"><div style="font-weight:700;margin-bottom:6px">${escapeHtml(club)}</div><div class="small" style="margin-bottom:10px">${swimmers.length} swimmers · ${clubRows.length} races</div><div>${swimmers.map(s=>`<span class="badge"><a href="swimmer.html?name=${encodeURIComponent(s)}">${escapeHtml(displaySwimmerName(s))}</a></span>`).join('')}</div></div>`; }).join('')||'<div class="card panel"><div class="small">No clubs found.</div></div>'; }
loadRows().then(r=>{ rows=r; renderClubs(); document.getElementById('clubSearch').addEventListener('input',e=>renderClubs(e.target.value)); }).catch(err=>{ console.error(err); document.getElementById('clubList').innerHTML='<div class="card panel"><div class="small">Could not load the CSV file.</div></div>'; });
</script></body></html>
