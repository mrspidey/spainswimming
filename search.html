<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Search</title><script src="data/app.js"></script></head><body><div class="wrap"><div class="nav"><a href="index.html">Home</a><a href="search.html" class="active">Search</a><a href="clubs.html">Clubs</a></div><h1>Search results</h1><div class="grid sidebar"><div class="card panel"><div class="stack"><input id="searchBox" placeholder="Search swimmer or club"/><select id="seasonFilter"><option value="">All seasons</option></select><select id="provinceFilter"><option value="">All provinces</option></select><select id="venueFilter"><option value="">All venues</option></select><select id="clubFilter"><option value="">All clubs</option></select><select id="strokeFilter"><option value="">All strokes</option></select><select id="eventFilter"><option value="">All events</option></select><button id="clearBtn">Clear filters</button></div></div><div class="stack"><div class="card panel"><h2 id="title">Results</h2><div class="tableWrap"><table><thead><tr><th>Date</th><th>Event</th><th>Swimmer</th><th>Club</th><th>Meet</th><th>Time</th></tr></thead><tbody id="results"></tbody></table></div></div></div></div></div><script>injectStyles();let rows=[];function fillSelect(id,values,current){const el=document.getElementById(id),label=el.options[0]?.textContent||'All';el.innerHTML='';const first=document.createElement('option');first.value='';first.textContent=label;el.appendChild(first);values.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;if(v===current)o.selected=true;el.appendChild(o);});}function run(){const q=document.getElementById('searchBox').value.trim(),season=document.getElementById('seasonFilter').value,province=document.getElementById('provinceFilter').value,venue=document.getElementById('venueFilter').value,club=document.getElementById('clubFilter').value,stroke=document.getElementById('strokeFilter').value,event=document.getElementById('eventFilter').value;const out=rows.filter(r=>!season||r.season===season).filter(r=>!province||r.province===province).filter(r=>!venue||r.venue===venue).filter(r=>!club||r.club===club).filter(r=>!stroke||r.stroke===stroke).filter(r=>!event||r.event===event).filter(r=>!q||[r.canonical_swimmer,r.swimmer_raw,r.club,r.meet,r.event,r.venue,r.province].some(v=>normalize(v).includes(normalize(q)))).sort((a,b)=>String(b.dateIso||b.date).localeCompare(String(a.dateIso||a.date))||(a.distance||0)-(b.distance||0));document.getElementById('title').textContent='Results ('+out.length+')';document.getElementById('results').innerHTML=out.map(r=>`<tr><td data-label="Date">${escapeHtml(r.date)}</td><td data-label="Event">${escapeHtml(r.event)}</td><td data-label="Swimmer"><a href="swimmer.html?name=${encodeURIComponent(r.canonical_swimmer)}">${escapeHtml(displaySwimmerName(r.canonical_swimmer))}</a></td><td data-label="Club">${escapeHtml(r.club)}</td><td data-label="Meet">${escapeHtml(r.meet)}<div class="small">${escapeHtml(r.venue)}</div></td><td data-label="Time">${escapeHtml(r.time)}</td></tr>`).join('')||'<tr><td class="empty">No rows found.</td></tr>';}loadRows().then(r=>{rows=r;fillSelect('seasonFilter',uniqueSorted(rows.map(r=>r.season)),'');fillSelect('provinceFilter',uniqueSorted(rows.map(r=>r.province)),'');fillSelect('venueFilter',uniqueSorted(rows.map(r=>r.venue)),'');fillSelect('clubFilter',uniqueSorted(rows.map(r=>r.club)),'');fillSelect('strokeFilter',uniqueSorted(rows.map(r=>r.stroke)),'');fillSelect('eventFilter',uniqueSorted(rows.map(r=>r.event)).sort((a,b)=>eventSort(a,b,rows)),'');['searchBox','seasonFilter','provinceFilter','venueFilter','clubFilter','strokeFilter','eventFilter'].forEach(id=>document.getElementById(id).addEventListener(id==='searchBox'?'input':'change',run));document.getElementById('clearBtn').addEventListener('click',()=>{document.getElementById('searchBox').value='';['seasonFilter','provinceFilter','venueFilter','clubFilter','strokeFilter','eventFilter'].forEach(id=>document.getElementById(id).value='');run();});run();}).catch(err=>{console.error(err);document.getElementById('results').innerHTML='<tr><td class="empty">Could not load the CSV file.</td></tr>';});</script></body></html>
