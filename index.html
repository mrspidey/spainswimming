<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Spain Swimming Results (Boys 2014)</title><script src="data/app.js"></script></head><body><div class="wrap"><div class="nav"><a href="index.html" class="active">Home</a><a href="search.html">Search</a><a href="clubs.html">Clubs</a></div><h1>Spain Swimming Results (Boys 2014)</h1><div class="card panel"><h2>Latest completed meets</h2><div class="muted">This homepage now shows completed meets, not national standings.</div></div><div id="meetList" class="stack" style="margin-top:14px"></div></div><script>injectStyles();loadRows().then(rows=>{const meets=groupMeets(rows);document.getElementById('meetList').innerHTML=meets.map(m=>`<div class="listCard"><h3><a href="meet.html?id=${encodeURIComponent(m.id)}">${escapeHtml(m.meet)}</a></h3><div class="muted">${escapeHtml(m.venue)} · ${escapeHtml(m.date)}</div><div style="margin-top:8px"><span class="badge">${m.eventCount} events</span><span class="badge">${m.swimmerCount} swimmers</span><span class="badge">${escapeHtml(m.province || m.region)}</span></div><div style="margin-top:10px"><a href="meet.html?id=${encodeURIComponent(m.id)}">View results →</a></div></div>`).join('') || '<div class="card panel"><div class="empty">No meets found.</div></div>';}).catch(err=>{console.error(err);document.getElementById('meetList').innerHTML='<div class="card panel"><div class="empty">Could not load the CSV file.</div></div>';});</script></body></html>
