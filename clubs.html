<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Clubs</title><script src="data/app.js"></script></head><body><div class="wrap"><div class="nav"><a href="index.html">Home</a><a href="search.html">Search</a><a href="clubs.html" class="active">Clubs</a></div><h1>Club directory</h1><div class="card panel"><input id="clubSearch" placeholder="Search club"/></div><div id="clubList" class="stack" style="margin-top:14px"></div></div><script>injectStyles();let rows=[];function renderClubs(q=''){const list=document.getElementById('clubList');const clubs=[...new Set(rows.map(r=>r.club))].filter(Boolean).sort((a,b)=>a.localeCompare(b,'es'));const filtered=clubs.filter(c=>!q||normalize(c).includes(normalize(q)));list.innerHTML=filtered.map(club=>{const clubRows=rows.filter(r=>r.club===club);const swimmers=[...new Set(clubRows.map(r=>r.canonical_swimmer))].sort((a,b)=>a.localeCompare(b,'es'));return `<div class="listCard"><h3>${escapeHtml(club)}</h3><div class="small" style="margin-bottom:10px">${swimmers.length} swimmers · ${clubRows.length} races</div><div>${swimmers.map(s=>`<span class="badge"><a href="swimmer.html?name=${encodeURIComponent(s)}">${escapeHtml(displaySwimmerName(s))}</a></span>`).join('')}</div></div>`;}).join('')||'<div class="card panel"><div class="muted">No clubs found.</div></div>';}loadRows().then(r=>{rows=r;renderClubs();document.getElementById('clubSearch').addEventListener('input',e=>renderClubs(e.target.value));}).catch(err=>{console.error(err);document.getElementById('clubList').innerHTML='<div class="card panel"><div class="muted">Could not load the CSV file.</div></div>';});</script></body></html>
