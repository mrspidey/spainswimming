<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swimmer Profile</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f7f7f7;
    }

    h1 {
      margin-bottom: 5px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #f0f0f0;
    }

    tr:hover {
      background: #fafafa;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      background: #007bff;
      color: white;
      border-radius: 5px;
      font-size: 12px;
      margin-left: 10px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Jack Hristov Simeonov</h1>
    <p>
      Club Deportivo Caxton College
      <span class="badge">Only Caxton swimmer</span>
    </p>
  </div>

  <div class="card">
    <h2>Personal Bests</h2>

    <table>
      <thead>
        <tr>
          <th>Event</th>
          <th>Course</th>
          <th>Time</th>
          <th>Date</th>
          <th>Meet</th>
        </tr>
      </thead>
      <tbody id="pb-table-body"></tbody>
    </table>
  </div>

  <script>
    function parseCSV(text) {
      const rows = [];
      let current = '';
      let insideQuotes = false;
      let row = [];

      for (let i = 0; i < text.length; i++) {
        const char = text[i];

        if (char === '"' && text[i + 1] === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
          row.push(current);
          current = '';
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
          if (current || row.length) {
            row.push(current);
            rows.push(row);
            row = [];
            current = '';
          }
        } else {
          current += char;
        }
      }

      if (current || row.length) {
        row.push(current);
        rows.push(row);
      }

      return rows;
    }

    async function loadJackPBs() {
      const res = await fetch("data/jack_pbs.csv");
      const text = await res.text();

      const parsed = parseCSV(text);
      const headers = parsed[0];
      const data = parsed.slice(1);

      const table = document.getElementById("pb-table-body");

      data.forEach(cols => {
        if (!cols.length) return;

        const row = {};
        headers.forEach((h, i) => row[h] = cols[i]);

        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${row.event}</td>
          <td>${row.course}</td>
          <td><strong>${row.time}</strong></td>
          <td>${row.date}</td>
          <td>${row.meet}</td>
        `;

        table.appendChild(tr);
      });
    }

    loadJackPBs();
  </script>

</body>
</html>
