<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Clubs</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--line:#e5e7eb;--text:#0f172a;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box} html{scroll-behavior:smooth}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
a{color:var(--blue);text-decoration:none}
.wrap{max-width:1280px;margin:0 auto;padding:12px}
h1{margin:0 0 14px;font-size:clamp(28px,5vw,56px);line-height:1.05}
h2{margin:0 0 12px;font-size:18px}
.layout{display:grid;grid-template-columns:300px 1fr;gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.panel{padding:14px}
.stack{display:grid;gap:10px}
input,select,button{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #cbd5e1;background:#fff;font:inherit;color:inherit}
button{background:var(--blue);color:#fff;border:none;font-weight:700;cursor:pointer}
.seg{display:flex;gap:8px;flex-wrap:wrap}
.seg button{width:auto;background:#fff;border:1px solid var(--line);color:var(--text)}
.seg button.active{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
.muted{color:var(--muted);font-size:14px}
.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:16px;-webkit-overflow-scrolling:touch}
table{width:100%;min-width:760px;border-collapse:collapse;background:#fff}
th,td{padding:11px 9px;border-bottom:1px solid #eef2f7;text-align:left;vertical-align:top}
th{background:#f8fafc;font-size:14px}
td{font-size:14px}
.rank{font-weight:700}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#f1f5f9;font-size:12px;margin:0 6px 6px 0}
.small{font-size:12px;color:var(--muted)}
.empty{padding:18px;color:var(--muted)}
.good{color:var(--green);font-weight:700}
.bad{color:var(--red);font-weight:700}
.hero{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.back{display:inline-block;margin-bottom:8px}
.kpiGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.kpi{padding:14px;border:1px solid var(--line);border-radius:16px;background:#fff}
.kpi .label{font-size:12px;color:var(--muted);margin-bottom:6px}
.kpi .value{font-size:24px;font-weight:700}
.mobileOnly{display:none}
.desktopOnly{display:table-cell}
.meetDetails{display:none}
.clubCard{padding:12px;border:1px solid var(--line);border-radius:16px;background:#fff}
@media (max-width:900px){
  .layout{grid-template-columns:1fr}
  .wrap{padding:10px}
  .panel{padding:12px}
  h1{font-size:26px}
  .kpiGrid{grid-template-columns:1fr}
  .stickyFilters{position:sticky;top:8px;z-index:20}
  table{min-width:620px}
}
@media (max-width:640px){
  .desktopOnly{display:none}
  .mobileOnly{display:block}
  table{min-width:0}
  .tableWrap{border:none;overflow:visible}
  table,thead,tbody,tr,td,th{display:block}
  thead{display:none}
  tr{border:1px solid var(--line);border-radius:16px;margin-bottom:10px;background:#fff;overflow:hidden}
  td{border-bottom:1px solid #eef2f7;padding:10px 12px}
  td:last-child{border-bottom:none}
  td::before{content:attr(data-label);display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  .expandBtn{margin-top:6px;padding:8px 10px;border-radius:12px;background:#fff;border:1px solid var(--line);color:var(--text);font-size:13px}
  .meetDetails.open{display:block;margin-top:6px}
}
</style>
</head><body>
<div class="wrap">
  <a class="back" href="index.html">← Back to rankings</a>
  <h1>Club directory</h1>
  <div class="card panel">
    <input id="clubSearch" placeholder="Search club"/>
  </div>
  <div id="clubList" class="stack" style="margin-top:14px"></div>
</div>
<script>

const DATA_URL = "data/spain_boys_2014_results_master.csv";
const JACK_BASELINES = [
  { key: "50 back", label: "50m Backstroke", time: "00:33.04", source: "Bulgarian 11-12 Championship" },
  { key: "100 back", label: "100m Backstroke", time: "01:12.42", source: "Bulgarian 11-12 Championship" },
  { key: "200 back", label: "200m Backstroke", time: "02:34.85", source: "Bulgarian 11-12 Championship" },
  { key: "50 fly", label: "50m Butterfly", time: "00:34.19", source: "Bulgarian 11-12 Championship" },
  { key: "100 free", label: "100m Freestyle", time: "01:07.39", source: "Bulgarian 11-12 Championship" },
  { key: "200 free", label: "200m Freestyle", time: "02:33.13", source: "World School Swim Championship" }
];
function parseCsvLine(line){
  const out=[]; let cur="", inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i], next=line[i+1];
    if(ch === '"'){
      if(inQuotes && next === '"'){ cur += '"'; i++; } else inQuotes = !inQuotes;
    } else if(ch === ',' && !inQuotes){ out.push(cur); cur=""; } else cur += ch;
  }
  out.push(cur); return out;
}
function pick(obj, keys){ for(const k of keys){ if(obj[k] !== undefined && String(obj[k]).trim() !== "") return String(obj[k]).trim(); } return ""; }
function parseCsv(text){
  const clean = text.replace(/^\uFEFF/, "").replace(/\r/g,"");
  const lines = clean.split("\n").filter(x => x.trim() !== "");
  if(!lines.length) return [];
  const headers = parseCsvLine(lines[0]).map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = parseCsvLine(line);
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i] ?? "").trim());
    const event = pick(obj, ["Event","event"]);
    const stroke = pick(obj, ["Stroke","stroke"]);
    const canonical = pick(obj, ["Canonical_Swimmer","Canonical","canonical_swimmer"]);
    const swimmerRaw = pick(obj, ["Swimmer_Raw","Swimmer","swimmer_raw"]);
    const club = pick(obj, ["Club","club"]);
    const meet = pick(obj, ["Meet","meet"]);
    const venue = pick(obj, ["Venue","venue"]);
    const province = pick(obj, ["Province","province"]);
    const region = pick(obj, ["Region","region"]);
    const season = pick(obj, ["Season","season"]);
    const dateIso = pick(obj, ["Date_ISO","date_iso"]);
    const date = pick(obj, ["Date","date"]) || dateIso;
    const time = pick(obj, ["Time","time"]);
    const rank = Number(pick(obj, ["Rank","rank"]) || 0);
    const distance = Number(pick(obj, ["Distance_m","Distance","distance_m","distance"]) || (event.match(/\d+/)?.[0] || 0));
    return {season, province, region, meet, venue, event, stroke, distance, date, dateIso,
      swimmer_raw: swimmerRaw, canonical_swimmer: canonical || swimmerRaw, club, time, rank, timeSeconds: timeToSeconds(time)};
  }).filter(r => r.event && r.canonical_swimmer && r.club && r.time);
}
function timeToSeconds(t){
  if(!t) return Infinity;
  const p = String(t).trim().split(":");
  if(p.length === 2) return Number(p[0]) * 60 + Number(p[1]);
  if(p.length === 3) return Number(p[0]) * 3600 + Number(p[1]) * 60 + Number(p[2]);
  return Number(t);
}
function secondsToDelta(secs){
  if(!isFinite(secs)) return "";
  const sign = secs > 0 ? "+" : secs < 0 ? "-" : "±";
  const val = Math.abs(secs);
  const mins = Math.floor(val / 60);
  const rem = (val - mins*60).toFixed(2).padStart(5, "0");
  return mins ? `${sign}${mins}:${rem}` : `${sign}${rem}`;
}
function normalize(s){ return String(s||"").toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function uniqueSorted(items){ return [...new Set(items.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es')); }
function eventSort(a,b, rows){ return ((rows.find(r => r.event === a)?.distance || 0) - (rows.find(r => r.event === b)?.distance || 0)) || a.localeCompare(b,'es'); }
function escapeHtml(s){ return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function displaySwimmerName(name){
  if(!name) return "";
  if(name.includes(",")){ const parts = name.split(","); return `${parts[1].trim()} ${parts[0].trim()}`.replace(/\s+/g,' '); }
  return name;
}
function isJackName(name){ const n = normalize(name); return n.includes("jack") && n.includes("simeonov"); }
function canonicalEventKey(event){
  const e = normalize(event), dist = (e.match(/\d+/) || [""])[0];
  if(e.includes("espalda") || e.includes("back")) return `${dist} back`;
  if(e.includes("libre") || e.includes("free")) return `${dist} free`;
  if(e.includes("mariposa") || e.includes("fly")) return `${dist} fly`;
  if(e.includes("braza") || e.includes("breast")) return `${dist} breast`;
  if(e.includes("estilo") || e.includes("medley") || e.includes("im")) return `${dist} im`;
  return `${dist} ${e}`.trim();
}
async function loadRows(){ const text = await fetch(DATA_URL, {cache:"no-store"}).then(r => r.text()); return parseCsv(text); }
function toggleMeetDetails(id){
  const el = document.getElementById(id);
  if(el) el.classList.toggle("open");
}

let rows=[];
function renderClubs(q=""){
  const list=document.getElementById("clubList");
  const clubs=[...new Set(rows.map(r=>r.club))].filter(Boolean).sort((a,b)=>a.localeCompare(b,'es'));
  const filtered=clubs.filter(c=>!q||normalize(c).includes(normalize(q)));
  list.innerHTML = filtered.map(club=>{
    const clubRows=rows.filter(r=>r.club===club);
    const swimmers=[...new Set(clubRows.map(r=>r.canonical_swimmer))].sort((a,b)=>a.localeCompare(b,'es'));
    return `<div class="clubCard"><div style="font-weight:700;margin-bottom:6px">${escapeHtml(club)}</div><div class="small" style="margin-bottom:10px">${swimmers.length} swimmers · ${clubRows.length} races</div><div>${swimmers.map(s=>`<span class="badge"><a href="swimmer.html?name=${encodeURIComponent(s)}">${escapeHtml(displaySwimmerName(s))}</a></span>`).join("")}</div></div>`;
  }).join("") || `<div class="card panel"><div class="muted">No clubs found.</div></div>`;
}
loadRows().then(r=>{ rows=r; renderClubs(); document.getElementById("clubSearch").addEventListener("input",e=>renderClubs(e.target.value)); });
</script></body></html>
