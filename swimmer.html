<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swimmer Profile</title>
  
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--line:#e5e7eb;--text:#0f172a;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--red:#dc2626}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    a{color:var(--blue);text-decoration:none}
    .wrap{max-width:1280px;margin:0 auto;padding:14px}
    h1{margin:0 0 14px;font-size:clamp(32px,5vw,56px);line-height:1.05}
    h2{margin:0 0 12px;font-size:18px}
    .layout{display:grid;grid-template-columns:320px 1fr;gap:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .panel{padding:16px}
    .stack{display:grid;gap:10px}
    input,select,button{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #cbd5e1;background:#fff;font:inherit;color:inherit}
    button{background:var(--blue);color:#fff;border:none;font-weight:700;cursor:pointer}
    .seg{display:flex;gap:8px;flex-wrap:wrap}
    .seg button{width:auto;background:#fff;border:1px solid var(--line);color:var(--text)}
    .seg button.active{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .muted{color:var(--muted);font-size:14px}
    .tableWrap{overflow:auto;border:1px solid var(--line);border-radius:16px}
    table{width:100%;min-width:920px;border-collapse:collapse;background:#fff}
    th,td{padding:12px 10px;border-bottom:1px solid #eef2f7;text-align:left;vertical-align:top}
    th{background:#f8fafc;font-size:14px}
    td{font-size:14px}
    .rank{font-weight:700}
    .saveBtn{width:auto;padding:10px 12px;border-radius:14px;background:#fff;border:1px solid var(--line);color:var(--text)}
    .saveBtn.saved{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#f1f5f9;font-size:12px;margin:0 6px 6px 0}
    .small{font-size:12px;color:var(--muted)}
    .empty{padding:18px;color:var(--muted)}
    .swimmerBtn{background:none;border:none;padding:0;color:var(--blue);font:inherit;cursor:pointer;text-align:left}
    .good{color:var(--green);font-weight:700}
    .bad{color:var(--red);font-weight:700}
    .hero{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .back{display:inline-block;margin-bottom:8px}
    .kpiGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .kpi{padding:14px;border:1px solid var(--line);border-radius:16px;background:#fff}
    .kpi .label{font-size:12px;color:var(--muted);margin-bottom:6px}
    .kpi .value{font-size:24px;font-weight:700}
    @media (max-width:900px){
      .layout{grid-template-columns:1fr}
      .wrap{padding:10px}
      .panel{padding:14px}
      h1{font-size:26px}
      .kpiGrid{grid-template-columns:1fr}
      th,td{padding:10px 8px}
    }
  </style>

</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Back to rankings</a>
  <div class="card panel">
    <div class="hero">
      <div>
        <h1 id="swimmerName">Swimmer</h1>
        <div class="muted" id="swimmerMeta"></div>
      </div>
      <div class="kpiGrid" style="max-width:640px;width:100%">
        <div class="kpi"><div class="label">Races</div><div class="value" id="kpiRaces">0</div></div>
        <div class="kpi"><div class="label">Events</div><div class="value" id="kpiEvents">0</div></div>
        <div class="kpi"><div class="label">PBs tracked</div><div class="value" id="kpiPBs">0</div></div>
      </div>
    </div>
  </div>

  <div class="stack" style="margin-top:16px">
    <div class="card panel">
      <div class="seg">
        <button id="bestBtn" class="active">Best times</button>
        <button id="resultsBtn">All results</button>
        <button id="progressBtn">PB vs baseline</button>
      </div>
      <p class="muted" id="subtitle" style="margin:12px 0 0">Best times for this swimmer across the current dataset.</p>
    </div>

    <div class="card panel">
      <h2 id="sectionTitle">Best times</h2>
      <div class="tableWrap"><table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div>
    </div>
  </div>
</div>

<script>

const DATA_URL = "data/spain_boys_2014_results_master.csv";
const JACK_BASELINES = {
  "50m Backstroke": { time: "00:33.04", source: "Bulgarian 11-12 Championship" },
  "100m Backstroke": { time: "01:12.42", source: "Bulgarian 11-12 Championship" },
  "200m Backstroke": { time: "02:34.85", source: "Bulgarian 11-12 Championship" },
  "50m Butterfly": { time: "00:34.19", source: "Bulgarian 11-12 Championship" },
  "100m Freestyle": { time: "01:07.39", source: "Bulgarian 11-12 Championship" },
  "200m Freestyle": { time: "02:33.13", source: "World School Swim Championship" },
  "50m Back": { time: "00:33.04", source: "Bulgarian 11-12 Championship" },
  "100m Back": { time: "01:12.42", source: "Bulgarian 11-12 Championship" },
  "200m Back": { time: "02:34.85", source: "Bulgarian 11-12 Championship" },
  "50m Fly": { time: "00:34.19", source: "Bulgarian 11-12 Championship" },
  "100m Free": { time: "01:07.39", source: "Bulgarian 11-12 Championship" },
  "200m Free": { time: "02:33.13", source: "World School Swim Championship" }
};

function parseCsvLine(line){
  const out=[]; let cur="", inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i], next=line[i+1];
    if(ch === '"'){
      if(inQuotes && next === '"'){ cur += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if(ch === ',' && !inQuotes){
      out.push(cur); cur="";
    } else cur += ch;
  }
  out.push(cur); return out;
}
function parseCsv(text){
  const clean = text.replace(/^\uFEFF/, "").replace(/\r/g,"");
  const lines = clean.split("\n").filter(x => x.trim() !== "");
  if(!lines.length) return [];
  const headers = parseCsvLine(lines[0]).map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = parseCsvLine(line);
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i] ?? "").trim());
    const event = obj["Event"] || "";
    const stroke = obj["Stroke"] || "";
    const canonical = obj["Canonical_Swimmer"] || obj["Canonical"] || obj["Swimmer_Raw"] || "";
    const swimmerRaw = obj["Swimmer_Raw"] || "";
    const club = obj["Club"] || "";
    const meet = obj["Meet"] || "";
    const venue = obj["Venue"] || "";
    const province = obj["Province"] || "";
    const region = obj["Region"] || "";
    const season = obj["Season"] || "";
    const dateIso = obj["Date_ISO"] || "";
    const date = obj["Date"] || dateIso || "";
    const time = obj["Time"] || "";
    const rank = Number(obj["Rank"] || 0);
    const distance = Number(obj["Distance_m"] || 0);
    return {
      season, province, region, meet, venue, event, stroke, distance, date, dateIso,
      swimmer_raw: swimmerRaw, canonical_swimmer: canonical, club, time, rank,
      timeSeconds: timeToSeconds(time)
    };
  }).filter(r => r.event && r.canonical_swimmer && r.club && r.time);
}
function timeToSeconds(t){
  if(!t) return Infinity;
  const p = String(t).trim().split(":");
  if(p.length === 2) return Number(p[0]) * 60 + Number(p[1]);
  if(p.length === 3) return Number(p[0]) * 3600 + Number(p[1]) * 60 + Number(p[2]);
  return Number(t);
}
function secondsToDelta(secs){
  if(!isFinite(secs)) return "";
  const sign = secs > 0 ? "+" : secs < 0 ? "-" : "±";
  const val = Math.abs(secs);
  const mins = Math.floor(val / 60);
  const rem = (val - mins*60).toFixed(2).padStart(5, "0");
  return mins ? `${sign}${mins}:${rem}` : `${sign}${rem}`;
}
function normalize(s){
  return String(s||"").toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
function uniqueSorted(items){ return [...new Set(items.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es')); }
function eventSort(a,b, rows){
  return ((rows.find(r => r.event === a)?.distance || 0) - (rows.find(r => r.event === b)?.distance || 0)) || a.localeCompare(b,'es');
}
function escapeHtml(s){ return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeJs(s){ return String(s ?? "").replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function displaySwimmerName(name){
  if(!name) return "";
  if(name.includes(",")){
    const parts = name.split(",");
    return `${parts[1].trim()} ${parts[0].trim()}`.replace(/\s+/g,' ');
  }
  return name;
}
function isJackName(name){
  const n = normalize(name);
  return n.includes("jack") && n.includes("simeonov");
}
async function loadRows(){
  const text = await fetch(DATA_URL).then(r => r.text());
  return parseCsv(text);
}

let rows = [];
let swimmerRows = [];
let mode = "best";
const params = new URLSearchParams(location.search);
const swimmerName = params.get("name") || "";

function render(){
  const head = document.getElementById("tableHead");
  const body = document.getElementById("tableBody");
  const subtitle = document.getElementById("subtitle");
  const sectionTitle = document.getElementById("sectionTitle");
  const isJack = swimmerRows.some(r => isJackName(r.canonical_swimmer));

  document.getElementById("bestBtn").classList.toggle("active", mode === "best");
  document.getElementById("resultsBtn").classList.toggle("active", mode === "results");
  document.getElementById("progressBtn").classList.toggle("active", mode === "progress");

  if(mode === "best"){
    subtitle.textContent = "Best times for this swimmer across the current dataset.";
    sectionTitle.textContent = "Best times";
    const byEvent = new Map();
    swimmerRows.forEach(r => {
      const existing = byEvent.get(r.event);
      if(!existing || r.timeSeconds < existing.timeSeconds) byEvent.set(r.event, r);
    });
    const bests = [...byEvent.values()].sort((a,b) => (a.distance||0)-(b.distance||0) || a.event.localeCompare(b.event,'es'));
    head.innerHTML = `<tr><th>Event</th><th>Best time</th><th>Meet</th><th>Date</th><th>National rank</th></tr>`;
    body.innerHTML = bests.map(r => {
      const eventRows = rows.filter(x => x.event === r.event);
      const bySwimmer = new Map();
      eventRows.forEach(x => {
        const ex = bySwimmer.get(x.canonical_swimmer);
        if(!ex || x.timeSeconds < ex.timeSeconds) bySwimmer.set(x.canonical_swimmer, x);
      });
      const ranked = [...bySwimmer.values()].sort((a,b)=>a.timeSeconds-b.timeSeconds);
      const nationalRank = ranked.findIndex(x => x.canonical_swimmer === r.canonical_swimmer) + 1;
      return `<tr><td>${escapeHtml(r.event)}</td><td>${escapeHtml(r.time)}</td><td>${escapeHtml(r.meet)}<div class="small">${escapeHtml(r.venue)}</div></td><td>${escapeHtml(r.date)}</td><td>${nationalRank || ''}</td></tr>`;
    }).join("") || `<tr><td colspan="5" class="empty">No data found.</td></tr>`;
  } else if(mode === "results"){
    subtitle.textContent = "All recorded races for this swimmer in the current master CSV.";
    sectionTitle.textContent = "All results";
    const sorted = [...swimmerRows].sort((a,b) => String(b.dateIso||b.date).localeCompare(String(a.dateIso||a.date)) || (a.distance||0)-(b.distance||0));
    head.innerHTML = `<tr><th>Date</th><th>Event</th><th>Time</th><th>Rank</th><th>Meet</th><th>Club</th></tr>`;
    body.innerHTML = sorted.map(r => `<tr><td>${escapeHtml(r.date)}</td><td>${escapeHtml(r.event)}</td><td>${escapeHtml(r.time)}</td><td>${r.rank || ''}</td><td>${escapeHtml(r.meet)}<div class="small">${escapeHtml(r.venue)}</div></td><td>${escapeHtml(r.club)}</td></tr>`).join("") || `<tr><td colspan="6" class="empty">No data found.</td></tr>`;
  } else {
    subtitle.textContent = isJack ? "Baseline seeded from Bulgaria and World School screenshots. Spain times will replace them once beaten." : "PB comparison is currently only set up for Jack.";
    sectionTitle.textContent = "PB vs baseline";
    if(!isJack){
      head.innerHTML = `<tr><th>Message</th></tr>`;
      body.innerHTML = `<tr><td class="empty">Baseline tracking is currently configured only for Jack Simeonov.</td></tr>`;
      return;
    }
    const byEvent = new Map();
    swimmerRows.forEach(r => {
      const existing = byEvent.get(r.event);
      if(!existing || r.timeSeconds < existing.timeSeconds) byEvent.set(r.event, r);
    });
    const rowsOut = [];
    Object.entries(JACK_BASELINES).forEach(([event, base]) => {
      const current = byEvent.get(event);
      const baseSecs = timeToSeconds(base.time);
      const currentSecs = current ? current.timeSeconds : Infinity;
      const activeBestSecs = Math.min(baseSecs, currentSecs);
      const delta = isFinite(currentSecs) ? currentSecs - activeBestSecs : Infinity;
      rowsOut.push({
        event,
        baseline: base.time,
        baselineSource: base.source,
        current: current ? current.time : "—",
        currentMeet: current ? current.meet : "",
        currentDate: current ? current.date : "",
        activeBest: isFinite(activeBestSecs) ? (activeBestSecs === baseSecs ? base.time : current.time) : base.time,
        delta
      });
    });
    rowsOut.sort((a,b) => timeToSeconds(a.baseline) - timeToSeconds(b.baseline));
    head.innerHTML = `<tr><th>Event</th><th>Baseline PB</th><th>Current Spain best</th><th>Active PB</th><th>Δ vs active PB</th><th>Source</th></tr>`;
    body.innerHTML = rowsOut.map(r => `<tr><td>${escapeHtml(r.event)}</td><td>${escapeHtml(r.baseline)}</td><td>${escapeHtml(r.current)}${r.currentMeet ? `<div class="small">${escapeHtml(r.currentMeet)} · ${escapeHtml(r.currentDate)}</div>` : ''}</td><td>${escapeHtml(r.activeBest)}</td><td class="${!isFinite(r.delta) ? '' : r.delta <= 0 ? 'good' : 'bad'}">${isFinite(r.delta) ? secondsToDelta(r.delta) : '—'}</td><td>${escapeHtml(r.baselineSource)}</td></tr>`).join("");
  }
}
loadRows().then(allRows => {
  rows = allRows;
  swimmerRows = rows.filter(r => normalize(r.canonical_swimmer) === normalize(swimmerName));
  const display = swimmerRows.length ? displaySwimmerName(swimmerRows[0].canonical_swimmer) : decodeURIComponent(swimmerName);
  document.getElementById("swimmerName").textContent = display || "Swimmer";
  const clubs = uniqueSorted(swimmerRows.map(r => r.club)).join(" • ");
  const seasons = uniqueSorted(swimmerRows.map(r => r.season)).join(", ");
  document.getElementById("swimmerMeta").textContent = `${clubs || 'Unknown club'}${seasons ? ' · ' + seasons : ''}`;
  document.getElementById("kpiRaces").textContent = swimmerRows.length;
  document.getElementById("kpiEvents").textContent = uniqueSorted(swimmerRows.map(r => r.event)).length;
  document.getElementById("kpiPBs").textContent = swimmerRows.some(r => isJackName(r.canonical_swimmer)) ? Object.keys(JACK_BASELINES).filter(x => !x.includes("Backstroke") || x.includes("m")).length : uniqueSorted(swimmerRows.map(r => r.event)).length;
  document.getElementById("bestBtn").addEventListener("click", ()=>{ mode = "best"; render(); });
  document.getElementById("resultsBtn").addEventListener("click", ()=>{ mode = "results"; render(); });
  document.getElementById("progressBtn").addEventListener("click", ()=>{ mode = "progress"; render(); });
  render();
});
</script>
</body>
</html>
